<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instinct RPG — Agent Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090f1c;
      --card: #111e30;
      --text: #e2d4b8;
      --muted: #8499aa;
      --gold: #c8a96e;
      --gold-light: #dfc98e;
      --border: rgba(200,169,110,0.28);
      --border-hi: rgba(200,169,110,0.55);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 18px;
      line-height: 1.6;
      padding: 24px 16px 48px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    .eyebrow {
      font-family: Cinzel, serif;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 8px;
    }
    h1 {
      font-family: Cinzel, serif;
      font-size: clamp(20px, 5vw, 26px);
      color: var(--gold-light);
      margin-bottom: 6px;
    }
    .session-sub { color: var(--muted); font-size: 15px; margin-bottom: 20px; }
    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .dot {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(200,169,110,0.15);
    }
    .dot.done { background: var(--gold); opacity: 0.5; }
    .dot.active { background: var(--gold); opacity: 1; }
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 20px 18px;
      margin-bottom: 16px;
    }
    .q-prompt {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 18px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      display: block;
      width: 100%;
      text-align: left;
      background: #0e1827;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .opt:hover { border-color: var(--border-hi); background: #132030; }
    .opt:active { transform: scale(0.99); }
    .opt.selected {
      border-color: var(--gold);
      background: rgba(200,169,110,0.12);
      box-shadow: 0 0 0 1px rgba(200,169,110,0.2);
    }
    .opt-label {
      font-weight: 700;
      color: var(--gold-light);
      margin-bottom: 4px;
    }
    .opt-desc { font-size: 15px; color: var(--muted); line-height: 1.45; }
    details.more {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }
    details.more summary {
      cursor: pointer;
      color: var(--gold);
      font-family: Cinzel, serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .nav {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: Cinzel, serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
    }
    .btn-primary {
      background: var(--gold);
      color: #1a1108;
      border-color: var(--gold);
      font-weight: 700;
    }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .done-panel { text-align: center; }
    .done-panel p { margin-bottom: 16px; color: var(--muted); }
    .summary {
      text-align: left;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
      font-size: 15px;
    }
    .summary div { margin-bottom: 10px; }
    .summary strong { color: var(--gold-light); }
    .copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold);
      color: #1a1108;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      pointer-events: none;
    }
    .copy-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .err { color: #f0a0a0; text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="copy-toast" id="toast">Copied — paste in agent chat</div>

<script>
const SESSIONS = {
  'flourish-combo-overhaul': {
    title: 'Flourish / Combo overhaul',
    subtitle: 'Six picks — one question at a time. Locks card prototypes after.',
    questions: [
      {
        id: 'currency-name',
        prompt: 'One word for BOTH the energy off an initial 6 AND the improv spend on a card option — you’re trading raw explosion power for a styled, guaranteed effect. What’s the table word?',
        more: 'Not two terms (no “earn X, spend on Flourish”). The natural 6 on the die can stay [Crit] or collapse into this word too — we’ll sync primer copy after you pick. Short, say-it-out-loud friendly.',
        options: [
          { id: 'a', label: 'A — Flourish', desc: 'Unify everything: “two Flourishes” = currency; card lines are Flourish options. Already in doctrine.' },
          { id: 'b', label: 'B — Riff', desc: 'Improv spin on the hit — you riff the success instead of rolling louder.' },
          { id: 'c', label: 'C — Sting', desc: 'Story punctuation — the sting in the tail; short and sharp.' },
          { id: 'd', label: 'D — Sell', desc: 'Acting/wrestling — you sell the moment, trading kayfabe power for table impact.' },
          { id: 'e', label: 'E — Kicker', desc: 'The optional kicker on your roll — familiar, punchy.' },
          { id: 'f', label: 'F — Flare', desc: 'Burst you redirect — visible style instead of hidden bonus dice.' },
          { id: 'g', label: 'G — Verve', desc: 'Energy + distinctive style; slightly fancier.' },
          { id: 'h', label: 'H — Burn', desc: 'You burn the explosion for a guaranteed printed payoff.' },
          { id: 'i', label: 'I — Other', desc: 'None of these — I’ll pitch in chat.' }
        ]
      },
      {
        id: 'six-in-pool',
        prompt: 'When you earn tokens from initial 6s, do those 6s still sit in your pool at face value for clearing the GM’s dice?',
        more: 'Old rule: 6s explode (roll + add to total) AND count toward Flourish options. New rule drops the extra roll — but the initial 6 might still help you beat opposing dice.',
        options: [
          { id: 'a', label: 'A — Yes, 6s stay in the pool', desc: 'Tokens are extra; you still assign the 6 against opposition.' },
          { id: 'b', label: 'B — No, spending converts the 6', desc: 'Each token spent removes that 6 from your pool (trade power for flourish).' },
          { id: 'c', label: 'C — 6s stay unless spent on a flourish', desc: 'Unspent tokens = 6s remain; spent ones leave the pool.' }
        ]
      },
      {
        id: 'spend-timing',
        prompt: 'When do players spend tokens on Flourishes in the check procedure?',
        more: 'Proposal: after pulling 1s (Misses), before assigning dice against the opposing pool — spend first, then read success.',
        options: [
          { id: 'a', label: 'A — After Misses, before pool read', desc: 'Matches “spend before rolling bonus dice.”' },
          { id: 'b', label: 'B — Only after you know the check outcome', desc: 'Spend on Hit/partial only — no gambling on failure.' },
          { id: 'c', label: 'C — Split: red on success, blue/green anytime', desc: 'Offensive flourishes need a hit; support/heal can fire on partial.' }
        ]
      },
      {
        id: 'fiction-gate',
        prompt: 'Keep Nathan’s Playtest 4 “does this bold Flourish word fit the fiction?” gate when spending?',
        more: 'P2 locked self-adjudication: GM judges fit only, never magnitude. Guaranteed numeric effects (Rattled 2 = remove 2 dice) replace GM-invented conditions.',
        options: [
          { id: 'a', label: 'A — Keep the fiction-fit gate', desc: 'Spend token → table agrees keyword fits → apply printed number.' },
          { id: 'b', label: 'B — Drop the gate — spend = auto-apply', desc: 'Faster; opportunity cost is enough.' },
          { id: 'c', label: 'C — Gate only red (offensive) flourishes', desc: 'Blue/green always apply when spent.' }
        ]
      },
      {
        id: 'flourish-cost-model',
        prompt: 'How should Flourish lines show cost vs effect magnitude (e.g. “Rattled 2”)?',
        more: 'Proposal: **Rattled 2** always means remove 2 objective dice. Cost is usually **1 token per line** unless the card prints **2** in the cost column. The number after the keyword is effect size, not cost.',
        options: [
          { id: 'a', label: 'A — 1 token per line; number = effect size', desc: 'Stagger 1 costs 1 token, removes 1 die. Stagger 2 costs 1 token, removes 2.' },
          { id: 'b', label: 'B — Number is both cost and effect', desc: 'Stagger 2 costs 2 tokens AND removes 2 dice (1:1).' },
          { id: 'c', label: 'C — Split display on card', desc: 'Show cost pip + keyword separately: “● Rattled — remove 2 dice” with gold “2” cost.' }
        ]
      },
      {
        id: 'prototype-scope',
        prompt: 'Which eight cards should we prototype first (2 per class from the June 30 table)?',
        more: 'Default set leans on playtest highlights + existing Flourish pass: Paladin Smite & Condemn; Barbarian Reckless Strike & Break; Rogue Sneak Attack & Smoke and Mirrors; Warlock Eldritch Strike & Feed the Fire.',
        options: [
          { id: 'a', label: 'A — Use the default eight', desc: 'Smite, Condemn, Reckless Strike, Break, Sneak Attack, Smoke and Mirrors, Eldritch Strike, Feed the Fire.' },
          { id: 'b', label: 'B — Swap in React cards', desc: 'Replace 2 Acts with Vanish (Rogue) + Patron’s Favor (Warlock).' },
          { id: 'c', label: 'C — I’ll list alternates in chat', desc: 'Pick this and name replacements.' }
        ]
      }
    ]
  },
  'primer-chargen-followup': {
    title: 'Primer — chargen follow-up',
    subtitle: 'One quick pick.',
    questions: [
      {
        id: 'background-ancestry',
        prompt: 'Your new chargen list drops Background & Ancestry. For this playtest, should the primer and table flow…',
        more: 'Doctrine §12 now matches your 5 Instinct / 1 Bond / Connection / Item / Core / 12 abilities flow. Background and Ancestry cards still exist in Card Studio.',
        options: [
          { id: 'a', label: 'A — Skip entirely this playtest', desc: 'Not in chargen; don’t mention them in the primer.' },
          { id: 'b', label: 'B — Optional add-ons', desc: 'One line: “if your table uses them, pick 1 each.”' },
          { id: 'c', label: 'C — Still required', desc: 'I misspoke — put them back in the primer steps.' }
        ]
      }
    ]
  },
  'primer-playtest': {
    title: 'Player Primer — playtest prep',
    subtitle: 'Three quick picks. One question at a time.',
    questions: [
      {
        id: 'depth',
        prompt: 'How deep should the primer update go before your playtest?',
        more: 'The live primer is instinct-rpg-primer-v2.html. Doctrine has moved on (Snap Check, retired Flaws, deck math).',
        options: [
          { id: 'a', label: 'A — Minimal patch', desc: 'Fix wrong or retired rules only (Snap Check, deck math, forbidden terms).' },
          { id: 'b', label: 'B — Full doctrine sync', desc: 'Restructure sections and align every mechanical claim to design/.' },
          { id: 'c', label: 'C — Teach-the-table focus', desc: 'Stay short — only what brand-new players need before scene 1.' }
        ]
      },
      {
        id: 'examples',
        prompt: 'What should we do with example cards embedded in the primer?',
        more: 'The primer renders mini cards from hardcoded JS at the file bottom — they may not match live Baserow.',
        options: [
          { id: 'a', label: 'A — Refresh from Baserow', desc: 'Pull current HTML from card-data.js / live cards.' },
          { id: 'b', label: 'B — Drop embedded cards', desc: 'Link to Card Studio class views instead.' },
          { id: 'c', label: 'C — Hero examples only', desc: 'Keep 2–3 (Instinct + React + Contest).' }
        ]
      },
      {
        id: 'connection',
        prompt: 'Connection cards in the chargen section?',
        more: 'Primer v2 describes Connections in deck-building. Doctrine does not lock them yet — only a template exists in card-inventory.',
        options: [
          { id: 'a', label: 'A — Keep for playtest', desc: 'You are playtesting Connections tomorrow.' },
          { id: 'b', label: 'B — Remove or mark experimental', desc: 'Not doctrine-locked yet.' },
          { id: 'c', label: 'C — Collapsible optional gate', desc: 'Same pattern as the Contests section.' }
        ]
      }
    ]
  }
};

function getSessionId() {
  const p = new URLSearchParams(location.search);
  return p.get('session') || 'primer-playtest';
}
function getStep() {
  const p = new URLSearchParams(location.search);
  const n = parseInt(p.get('step') || '1', 10);
  return isNaN(n) || n < 1 ? 1 : n;
}
function storageKey(sid) { return 'instinct-mc:' + sid; }
function loadAnswers(sid) {
  try { return JSON.parse(localStorage.getItem(storageKey(sid)) || '{}'); }
  catch { return {}; }
}
function saveAnswers(sid, answers) {
  localStorage.setItem(storageKey(sid), JSON.stringify(answers));
}
function go(sid, step) {
  const u = new URL(location.href);
  u.searchParams.set('session', sid);
  u.searchParams.set('step', String(step));
  location.href = u.pathname + u.search;
}

function buildReply(sid, session, answers) {
  const lines = ['**MC answers (' + session.title + '):**'];
  session.questions.forEach(q => {
    const pick = answers[q.id];
    const opt = q.options.find(o => o.id === pick);
    lines.push('- **' + q.prompt.split('?')[0] + ':** ' + (opt ? opt.label : pick || '(skipped)'));
  });
  return lines.join('\n');
}

function render() {
  const app = document.getElementById('app');
  const sid = getSessionId();
  const session = SESSIONS[sid];
  if (!session) {
    app.innerHTML = '<p class="err">Unknown session. Try <code>?session=primer-playtest</code></p>';
    return;
  }
  const step = getStep();
  const total = session.questions.length;
  const answers = loadAnswers(sid);

  if (step > total) {
    const reply = buildReply(sid, session, answers);
    app.innerHTML = `
      <div class="done-panel">
        <div class="eyebrow">All done</div>
        <h1>${session.title}</h1>
        <p>Your picks are saved. Copy the block below into the agent chat — or just tell the agent your letter choices.</p>
        <div class="summary" id="summary">${reply.split('\n').map(l => '<div>' + l.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>') + '</div>').join('')}</div>
        <div class="nav">
          <button class="btn btn-ghost" type="button" id="restart">Start over</button>
          <button class="btn btn-primary" type="button" id="copy">Copy for agent</button>
        </div>
      </div>`;
    document.getElementById('copy').onclick = () => {
      navigator.clipboard.writeText(reply).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    };
    document.getElementById('restart').onclick = () => {
      localStorage.removeItem(storageKey(sid));
      go(sid, 1);
    };
    return;
  }

  const q = session.questions[step - 1];
  const selected = answers[q.id] || null;

  const dots = session.questions.map((_, i) => {
    const n = i + 1;
    let cls = 'dot';
    if (n < step) cls += ' done';
    if (n === step) cls += ' active';
    return '<div class="' + cls + '"></div>';
  }).join('');

  const opts = q.options.map(o => `
    <button type="button" class="opt${selected === o.id ? ' selected' : ''}" data-id="${o.id}">
      <div class="opt-label">${o.label}</div>
      <div class="opt-desc">${o.desc}</div>
    </button>`).join('');

  const more = q.more ? `<details class="more"><summary>Need context?</summary><p>${q.more}</p></details>` : '';

  app.innerHTML = `
    <div class="eyebrow">Question ${step} of ${total}</div>
    <h1>${session.title}</h1>
    <p class="session-sub">${session.subtitle || ''}</p>
    <div class="progress">${dots}</div>
    <div class="q-card">
      <div class="q-prompt">${q.prompt}</div>
      <div class="options" id="opts">${opts}</div>
      ${more}
    </div>
    <div class="nav">
      ${step > 1 ? '<button class="btn btn-ghost" type="button" id="back">Back</button>' : '<span style="flex:1"></span>'}
      <button class="btn btn-primary" type="button" id="next" ${selected ? '' : 'disabled'}>${step < total ? 'Next' : 'Finish'}</button>
    </div>`;

  document.querySelectorAll('.opt').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[q.id] = btn.dataset.id;
      saveAnswers(sid, answers);
      document.getElementById('next').disabled = false;
    };
  });
  const back = document.getElementById('back');
  if (back) back.onclick = () => go(sid, step - 1);
  document.getElementById('next').onclick = () => go(sid, step + 1);
}

render();
</script>
</body>
</html>
