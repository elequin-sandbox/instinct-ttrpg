<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instinct RPG - Card Studio</title>
<style>
:root{--ink:#1e1810;--parch:#f4ecd8;--gold:#c8a96e;--gold-d:#7a6030;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#16110a;color:#f0e6cf;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none !important;}

#gate{position:fixed;inset:0;background:#16110a;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#gate h1{font-family:system-ui,-apple-system,sans-serif;color:var(--gold);letter-spacing:3px;font-size:22px;text-transform:uppercase;}
#gate p{color:var(--gold-d);font-size:13px;}
#gate input{padding:10px 14px;background:#211810;border:1px solid var(--gold-d);color:#f0e6cf;border-radius:6px;font-family:inherit;font-size:15px;width:240px;text-align:center;}
#gate button{padding:10px 24px;background:var(--gold);color:#1a1108;border:none;border-radius:6px;font-weight:700;letter-spacing:1px;}
#gateErr{color:#d4604a;font-size:12px;height:14px;}

header{position:sticky;top:0;z-index:50;background:#1a1108;border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.brand{font-family:system-ui,-apple-system,sans-serif;color:var(--gold);letter-spacing:2px;font-size:15px;text-transform:uppercase;white-space:nowrap;}
.tabs{display:flex;gap:4px;}
.tab{background:transparent;border:1px solid transparent;color:#bfae86;padding:6px 14px;border-radius:6px;font-size:13px;letter-spacing:.5px;}
.tab:hover{color:#f0e6cf;}
.tab.active{background:#2a1d10;border-color:var(--gold-d);color:var(--gold);}
.tab .badge{display:inline-block;min-width:18px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--gold);color:#1a1108;font-size:11px;font-weight:700;}
.spacer{flex:1;}
.hbtn{background:#2a1d10;border:1px solid var(--gold-d);color:var(--gold);padding:6px 12px;border-radius:6px;font-size:12px;letter-spacing:.5px;}
.hbtn:hover{background:#3a2814;}

.filters{padding:14px 18px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid #2a1d10;background:#1d140b;font-family:system-ui,-apple-system,sans-serif;}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.flabel{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-d);min-width:74px;}
.chip{background:#241a0f;border:1px solid #3a2c19;color:#cbb98e;padding:4px 11px;border-radius:14px;font-size:12px;text-transform:capitalize;font-family:system-ui,-apple-system,sans-serif;}
.chip:hover{border-color:var(--gold-d);}
.chip.on{background:var(--gold);color:#1a1108;border-color:var(--gold);font-weight:700;}
/* class filter chip colors */
.chip.cls-barbarian{border-color:#9E2B2B;color:#e07070;}
.chip.cls-barbarian:hover,.chip.cls-barbarian.on{background:#9E2B2B;color:#fff;border-color:#9E2B2B;}
.chip.cls-fighter{border-color:#B45309;color:#e09050;}
.chip.cls-fighter:hover,.chip.cls-fighter.on{background:#B45309;color:#fff;border-color:#B45309;}
.chip.cls-paladin{border-color:#B8860B;color:#e0c040;}
.chip.cls-paladin:hover,.chip.cls-paladin.on{background:#B8860B;color:#fff;border-color:#B8860B;}
.chip.cls-cleric{border-color:#5E81AC;color:#9ab8d8;}
.chip.cls-cleric:hover,.chip.cls-cleric.on{background:#5E81AC;color:#fff;border-color:#5E81AC;}
.chip.cls-ranger{border-color:#2F6B3D;color:#6ab880;}
.chip.cls-ranger:hover,.chip.cls-ranger.on{background:#2F6B3D;color:#fff;border-color:#2F6B3D;}
.chip.cls-rogue{border-color:#6C5BA8;color:#b0a0e0;}
.chip.cls-rogue:hover,.chip.cls-rogue.on{background:#6C5BA8;color:#fff;border-color:#6C5BA8;}
.chip.cls-druid{border-color:#5A7D2A;color:#9ac050;}
.chip.cls-druid:hover,.chip.cls-druid.on{background:#5A7D2A;color:#fff;border-color:#5A7D2A;}
.chip.cls-warlock{border-color:#9A2B5E;color:#e070a0;}
.chip.cls-warlock:hover,.chip.cls-warlock.on{background:#9A2B5E;color:#fff;border-color:#9A2B5E;}
.chip.cls-bard{border-color:#B5388D;color:#e070c0;}
.chip.cls-bard:hover,.chip.cls-bard.on{background:#B5388D;color:#fff;border-color:#B5388D;}
.chip.type-background{border-color:#6aa0c0;color:#9ac8e0;}
.chip.type-background:hover,.chip.type-background.on{background:#6aa0c0;color:#fff;border-color:#6aa0c0;}
.chip.type-ancestry{border-color:#bfa060;color:#d8c080;}
.chip.type-ancestry:hover,.chip.type-ancestry.on{background:#bfa060;color:#1a1208;border-color:#bfa060;}
.chip.type-bond{border-color:#8aa880;color:#aac8a0;}
.chip.type-bond:hover,.chip.type-bond.on{background:#8aa880;color:#1a2a1a;border-color:#8aa880;}
.chip.type-flaw{border-color:#c87070;color:#e09090;}
.chip.type-flaw:hover,.chip.type-flaw.on{background:#c87070;color:#fff;border-color:#c87070;}
.chip.type-trait{border-color:#7a90c0;color:#9aace0;}
.chip.type-trait:hover,.chip.type-trait.on{background:#7a90c0;color:#fff;border-color:#7a90c0;}
.chip.type-act{border-color:#1D4ED8;color:#93b8ff;}
.chip.type-act:hover,.chip.type-act.on{background:#1D4ED8;color:#EFF6FF;border-color:#1D4ED8;}
.chip.type-react{border-color:#6D28D9;color:#c4b0e8;}
.chip.type-react:hover,.chip.type-react.on{background:#6D28D9;color:#EDE9FE;border-color:#6D28D9;}
#search{flex:1;min-width:180px;padding:8px 12px;background:#241a0f;border:1px solid #3a2c19;color:#f0e6cf;border-radius:8px;font-family:inherit;font-size:14px;}
#count{font-size:12px;color:var(--gold-d);white-space:nowrap;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(2.5in,1fr));gap:22px 18px;padding:24px 18px;justify-items:center;}
.cardwrap{position:relative;width:2.5in;cursor:pointer;transition:transform .12s;}
.cardwrap:hover{transform:translateY(-3px);}
.cardwrap .card{box-shadow:5px 5px 0 rgba(0,0,0,.55);}
.cardwrap.sel::after{content:"in deck";position:absolute;top:-9px;right:-6px;background:#2f7d4f;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.cardwrap.sel .card{outline:3px solid #3fae6c;outline-offset:1px;}
.deckbtn{position:absolute;bottom:6px;right:6px;z-index:3;width:30px;height:30px;border-radius:50%;border:none;background:var(--gold);color:#1a1108;font-size:18px;font-weight:700;line-height:1;opacity:0;transition:opacity .12s;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.cardwrap:hover .deckbtn{opacity:1;}
.cardwrap.sel .deckbtn{opacity:1;background:#3fae6c;color:#fff;}
.deckbtn.remove{opacity:1;background:rgba(120,28,28,.88);color:#fff;font-size:16px;font-weight:700;}
.deckbtn.remove:hover{background:#9e2b2b;}
.empty{padding:60px;text-align:center;color:var(--gold-d);font-size:15px;width:100%;}

/* keyword pills + bold + icons */
.kw{display:inline-block;padding:0 5px;border-radius:3px;font-weight:700;font-size:.92em;line-height:1.5;white-space:nowrap;vertical-align:baseline;}
.kw .ic{font-style:normal;margin-right:2px;font-weight:400;}
.kw-guard{background:#166534;color:#F0FDF4;}
.kw-boost{background:#0F766E;color:#CCFBF1;}
.kw-hd{background:#7F1D1D;color:#FEE2E2;}
.kw-act{background:#1D4ED8;color:#EFF6FF;}
.kw-react{background:#6D28D9;color:#EDE9FE;}
.kw-boon{background:#B8860B;color:#1a1208;}
.kw-bane{background:#7A1F1F;color:#FEE2E2;}
.kw-cond{background:#C2620E;color:#FFF7ED;}
.kw-status{background:#475569;color:#F1F5F9;}
/* loadout recipe pill types */
.kw-background{background:#633806;color:#fef3c7;}
.kw-ancestry{background:#14532D;color:#dcfce7;}
.kw-bond{background:#0f2b15;color:#8aa880;}
.kw-flaw{background:#5a1010;color:#f0b0a8;}
.kw-trait{background:#1e2540;color:#7a90c0;}
.kw-item{background:#3a2a10;color:#e0d0a0;}
/* per-class ability card pills */
.kw-barbarian{background:#9E2B2B;color:#fff;}
.kw-fighter{background:#B45309;color:#fff;}
.kw-paladin{background:#B8860B;color:#1a1208;}
.kw-cleric{background:#5E81AC;color:#fff;}
.kw-ranger{background:#2F6B3D;color:#fff;}
.kw-rogue{background:#6C5BA8;color:#fff;}
.kw-druid{background:#5A7D2A;color:#fff;}
.kw-warlock{background:#9A2B5E;color:#fff;}
.kw-bard{background:#B5388D;color:#fff;}
.cb .ic{font-style:normal;margin-right:2px;}
.cb-act,.cb-react{}

/* crit cost on the same line, text wraps cleanly */
.scope-ability .ci{display:flex;gap:5px;align-items:flex-start;}
.scope-ability .ci .tc{flex:0 0 auto;}
.scope-ability .ci .ci-txt{flex:1;}
.scope-ability .tp.tc{background:#3B0764;color:#E9D5FF;font-weight:700;border-radius:3px;padding:0 5px;font-size:.9em;}

/* uniform TCG dimensions */
.scope-ability .card,.scope-core .card,.scope-boon .card{width:2.5in;height:3.5in;}

#modal{position:fixed;inset:0;z-index:200;background:rgba(10,7,3,.82);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;}
.sheet{background:#221810;border:1px solid var(--gold-d);border-radius:12px;width:min(80vw,1600px);display:flex;flex-direction:row;gap:24px;padding:24px;position:relative;align-items:flex-start;}
.sheet-card{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:12px;}
.modal-card-outer{display:flex;justify-content:center;}
.modal-card-zoomed{cursor:default;}
.vtoggle{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:12px;height:30px;flex-shrink:0;}
.vtoggle button{background:#2a1d10;border:1px solid var(--gold-d);color:var(--gold);width:30px;height:26px;border-radius:6px;font-size:14px;}
.vtoggle button:disabled{opacity:.3;cursor:default;}
.vlabel{min-width:120px;max-width:280px;text-align:center;color:#cbb98e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vnote{min-height:16px;font-size:11px;color:var(--gold-d);font-style:italic;text-align:center;line-height:1.4;}
.sheet-side{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
@media(max-width:700px){.sheet{flex-direction:column;width:94vw;}}
.sheet-side h2{font-family:system-ui,-apple-system,sans-serif;color:var(--gold);font-size:18px;}
.meta{font-size:12px;color:var(--gold-d);text-transform:capitalize;}
.meta-cls{text-transform:capitalize;}
.sbtns{display:flex;gap:8px;flex-wrap:wrap;}
.sbtns button{flex:1;min-width:110px;padding:8px;border-radius:7px;border:1px solid var(--gold-d);background:#2a1d10;color:var(--gold);font-size:12px;}
.sbtns button.primary{background:var(--gold);color:#1a1108;border-color:var(--gold);font-weight:700;}
.cmts{border-top:1px solid #3a2c19;padding-top:12px;display:flex;flex-direction:column;gap:8px;}
.cmts h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-d);}
.cmt{background:#1b130b;border-left:2px solid var(--gold-d);padding:6px 10px;border-radius:4px;font-size:13px;}
.cmt .who{color:var(--gold);font-weight:700;font-size:12px;}
.cmt .when{color:#6a5a3a;font-size:10px;margin-left:6px;}
.cmtform{display:flex;flex-direction:column;gap:6px;}
.cmtform input,.cmtform textarea{background:#241a0f;border:1px solid #3a2c19;color:#f0e6cf;border-radius:6px;padding:7px 9px;font-family:inherit;font-size:13px;}
.cmtform textarea{resize:vertical;min-height:48px;}
.cmtform button{align-self:flex-end;background:var(--gold);color:#1a1108;border:none;border-radius:6px;padding:6px 16px;font-weight:700;font-size:12px;}
.cmt-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.cmt-del{background:none;border:none;color:#7a5a4a;font-size:12px;cursor:pointer;margin-left:auto;padding:0 4px;line-height:1;}
.cmt-del:hover{color:#d4604a;}
.cmt-chk{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:11px;color:#9a8a5a;cursor:pointer;user-select:none;}
.cmt-chk.on{color:#d8b84a;font-weight:700;}
.cmt-chk input{accent-color:#c8a96e;}
.cmtform .cmt-chk{color:#bfae86;margin-top:2px;}
.closex{position:absolute;top:12px;right:16px;background:none;border:none;color:#cbb98e;font-size:26px;line-height:1;}

.panel{padding:20px 18px;}
.panel h2{font-family:system-ui,-apple-system,sans-serif;color:var(--gold);font-size:18px;margin-bottom:6px;}
.panel .sub{color:var(--gold-d);font-size:13px;margin-bottom:14px;}
.simbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.simbar button{padding:9px 16px;border-radius:8px;border:1px solid var(--gold-d);background:#2a1d10;color:var(--gold);font-size:13px;letter-spacing:.5px;}
.simbar button.primary{background:var(--gold);color:#1a1108;border-color:var(--gold);font-weight:700;}
.simbar button:disabled{opacity:.35;cursor:default;}
.simstat{color:#cbb98e;font-size:13px;}
#simCoreArea{
  background:linear-gradient(160deg,rgba(18,52,20,.55) 0%,rgba(10,35,12,.62) 100%);
  border:1px solid rgba(65,112,60,.32);
  border-radius:12px;padding:10px 16px 12px;margin-bottom:14px;
  box-shadow:inset 0 3px 22px rgba(0,0,0,.52),inset 0 0 0 1px rgba(255,255,255,.03),0 2px 8px rgba(0,0,0,.35);
}
#simCoreArea .grid{margin-top:8px;}
#simCoreArea .cardwrap{zoom:0.62;}
.sim-core-label{font-family:system-ui,-apple-system,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(138,188,125,.75);text-transform:uppercase;cursor:help;}
#simHandArea{
  background:rgba(26,16,4,.52);
  border:1px solid rgba(148,118,52,.22);
  border-radius:12px;padding:16px 20px 20px;
  box-shadow:inset 0 2px 14px rgba(0,0,0,.42),inset 0 0 0 1px rgba(255,255,255,.02);
}
#simHandArea .sim-hand-label{margin-bottom:10px;}
.sim-hand-label{font-family:system-ui,-apple-system,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold-d);text-transform:uppercase;}
.sim-hand-grid{display:flex;gap:12px;flex-wrap:nowrap;overflow:hidden;max-width:calc(5 * 2.5in + 4 * 12px);}

#printroot{display:none;}
@media print{
  body{background:#fff;}
  header,.filters,#modal,#toast{display:none !important;}
  .view{display:none !important;}
  #printroot{display:block !important;}
  .print-sheet{display:grid;grid-template-columns:repeat(3,2.5in);gap:0;justify-content:center;align-content:start;}
  .print-sheet .cardwrap{cursor:default;transform:none;width:2.5in;}
  .print-sheet .cardwrap .card{box-shadow:none !important;}
  .cardwrap{break-inside:avoid;page-break-inside:avoid;}
  @page{size:letter;margin:.35in;}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2f7d4f;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:500;pointer-events:none;}
#toast.show{opacity:1;}

.ob-step-lbl{color:var(--gold-d);font-size:12px;margin-top:4px;}
.ob-skip{background:none;border:none;color:var(--gold-d);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.ob-skip:hover{color:var(--gold);}
.ob-progress{height:3px;background:#2a1d10;border-radius:2px;}
.ob-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}
.ob-subtext{color:#cbb98e;font-size:13px;text-align:center;line-height:1.6;}
.ob-class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;}
.ob-class-tile{border:2px solid;border-radius:10px;padding:16px 14px;cursor:pointer;transition:transform .12s,box-shadow .12s;background:#1d140b;}
.ob-class-tile:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.5);}
.ob-class-name{font-size:15px;font-weight:700;letter-spacing:.8px;margin-bottom:6px;text-transform:uppercase;font-family:system-ui,-apple-system,sans-serif;}
.ob-class-tag{font-size:12px;line-height:1.5;color:#cbb98e;}
.ob-class-count{margin-top:8px;font-size:10px;color:#6a5a3a;letter-spacing:.5px;}
.ob-cards-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.ob-card-option{cursor:pointer;transition:transform .12s;position:relative;}
.ob-card-option:hover{transform:translateY(-4px);}
.ob-card-option .cardwrap{pointer-events:none;}
.ob-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.ob-btn{padding:10px 22px;border-radius:8px;border:1px solid var(--gold-d);background:#2a1d10;color:var(--gold);font-size:13px;cursor:pointer;letter-spacing:.5px;font-family:inherit;}
.ob-btn:hover{background:#3a2814;}
.ob-btn.primary{background:var(--gold);color:#1a1108;border-color:var(--gold);font-weight:700;}
.ob-round-lbl{text-align:center;color:var(--gold);font-size:13px;letter-spacing:1px;font-family:system-ui,-apple-system,sans-serif;}
.ob-placeholder{text-align:center;padding:44px 24px;background:#1d140b;border:1px solid #2a1d10;border-radius:12px;max-width:500px;margin:0 auto;}
.ob-placeholder-icon{font-size:36px;margin-bottom:14px;}
.ob-placeholder-title{color:var(--gold);font-size:16px;font-weight:700;margin-bottom:8px;font-family:system-ui,-apple-system,sans-serif;}
.ob-placeholder-body{color:#cbb98e;font-size:14px;line-height:1.6;}
.ob-review-group{margin-bottom:20px;}
.ob-review-divider{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold-d);padding-bottom:8px;border-bottom:1px solid #2a1d10;margin-bottom:12px;font-family:system-ui,-apple-system,sans-serif;}
.ob-launch-btn{background:var(--gold) !important;color:#1a1108 !important;border-color:var(--gold) !important;font-weight:700;letter-spacing:.5px;}
.ob-launch-btn:hover{background:#d4b878 !important;}

/* ===== DECK LANE LAYOUT ===== */
.deck-lanes-wrap{display:flex;flex-direction:column;overflow:hidden;}
.deck-lanes{display:flex;overflow-x:auto;scroll-behavior:smooth;padding-bottom:2px;}
.deck-lanes::-webkit-scrollbar{height:5px;}
.deck-lanes::-webkit-scrollbar-track{background:#1a1108;}
.deck-lanes::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}
.deck-lane{flex-shrink:0;padding:14px 16px 20px;border-right:1px solid #2a1d10;}
.deck-lane:last-child{border-right:none;}
.deck-lane-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold-d);white-space:nowrap;padding-bottom:8px;margin-bottom:12px;border-bottom:1px solid #2a1d10;}
.deck-lane-lbl span{font-size:9px;opacity:.5;}
.deck-lane-cards{display:grid;grid-template-rows:repeat(3,auto);grid-auto-flow:column;gap:14px;align-items:start;}
.deck-lane-nav{display:flex;gap:6px;padding:10px 16px;border-top:1px solid #2a1d10;flex-wrap:wrap;background:#1a1108;flex-shrink:0;}
.deck-lane-nav.nav-top{border-top:none;border-bottom:1px solid #2a1d10;margin-bottom:12px;}
.deck-lane-navbtn{background:#241a0f;border:1px solid #3a2c19;color:#cbb98e;padding:4px 12px;border-radius:12px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;letter-spacing:.5px;}
.deck-lane-navbtn:hover{border-color:var(--gold-d);color:var(--gold);}
</style>
</head>
<body>

<div id="gate">
  <h1>Instinct RPG</h1>
  <p>Card Studio - enter the playtest password</p>
  <input id="gatePass" type="password" placeholder="password" autocomplete="off">
  <button onclick="checkGate()">Enter</button>
  <div id="gateErr"></div>
</div>

<header class="hidden" id="appHeader">
  <span class="brand">Instinct RPG - Card Studio</span>
  <div class="tabs">
    <button class="tab active" data-view="browse" onclick="showView('browse')">Browse</button>
    <button class="tab" data-view="deck" onclick="showView('deck')">My Deck <span class="badge" id="deckBadge">0</span></button>
    <button class="tab" data-view="sim" onclick="showView('sim')">Simulator</button>
  </div>
  <button class="hbtn ob-launch-btn" onclick="startOnboarding()">✦ Build My Deck</button>
  <span class="spacer"></span>
  <button class="hbtn" onclick="printSelected()">Print Selected (<span id="printN">0</span>)</button>
  <button class="hbtn" onclick="reload()">Reload</button>
</header>

<div id="ob-overlay" class="hidden"><div id="ob-inner"></div></div>

<section class="view" id="view-browse">
  <div class="filters">
    <div class="frow"><input id="search" placeholder="Search names and rules text..." oninput="applyFilters()"><span id="count"></span></div>
    <div class="frow"><span class="flabel">Class</span><span id="classChips"></span></div>
    <div class="frow"><span class="flabel">Type</span><span id="typeChips"></span><span class="flabel" style="margin-left:14px;white-space:nowrap">Action Type</span><span id="actionChips"></span></div>
    <div class="frow"><span class="flabel">Show</span><button class="chip" onclick="toggleFilter('new','new',this)">★ New</button></div>
    <div class="frow"><span class="flabel">Actions</span>
      <button class="chip" onclick="selectAllFiltered()">+ Select all (filtered)</button>
      <button class="chip" onclick="clearDeck()">x Clear deck</button>
      <button class="chip" onclick="resetFilters()">Reset filters</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<section class="view hidden" id="view-deck">
  <div class="panel">
    <h2>My Deck</h2>
    <div class="sub">Cards you select become a working deck for this session. <span id="deckSummary"></span></div>
    <div class="simbar">
      <button class="primary" onclick="showView('sim')">Go to Simulator</button>
      <button onclick="printSelected()">Print this deck</button>
      <button onclick="clearDeck()">Clear</button>
    </div>
    <div id="deckGrid"></div>
  </div>
</section>

<section class="view hidden" id="view-sim">
  <div class="panel">
    <h2>Play Simulator</h2>
    <div class="sub">Draw an opening hand of 5, then keep drawing one at a time. The deck depletes as you go.</div>
    <div class="simbar">
      <button class="primary" onclick="drawHand()">Draw Hand</button>
      <button onclick="drawOne()" id="drawOneBtn">Draw 1 More</button>
      <button onclick="resetSim()">Reshuffle / Reset</button>
      <span class="simstat" id="simStat"></span>
    </div>
    <div id="simCoreArea" class="hidden"></div>
    <div id="simHandArea"></div>
  </div>
</section>

<div id="modal" class="hidden" onclick="if(event.target===this)closeModal()"></div>
<div id="printroot"></div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
const CONFIG = {"useLive": true, "apiBase": "https://api.baserow.io/api/database/rows/table/", "tableCards": 911939, "tableComments": 1014004, "tableVersions": 1014012, "readToken": (typeof window!=="undefined" && window.IRPG_TOKEN) ? window.IRPG_TOKEN : "", "gatePassword": "instinct", "palette": {"barbarian": "#9E2B2B", "fighter": "#B45309", "paladin": "#B8860B", "cleric": "#5E81AC", "ranger": "#2F6B3D", "rogue": "#6C5BA8", "druid": "#5A7D2A", "warlock": "#9A2B5E", "bard": "#B5388D"}};


let LIVE = [];
const byKey = {};
let deck = new Set();
let filters = {cls:new Set(), type:new Set(), showNew:false};
let modalKey=null, modalVerIdx=0, modalVersions=[];
const SS = window.sessionStorage;
const ACT_IC='▶', REACT_IC='⚡';
const BOON_TYPE_ORDER=['Background','Ancestry','Bond','Flaw','Trait'];
const ACTION_TYPES=['Act','React'];
const TYPE_PALETTE={'Background':'#6aa0c0','Ancestry':'#bfa060','Bond':'#8aa880','Flaw':'#c87070','Trait':'#7a90c0'};

/* ---------- keyword restyle engine ---------- */
const KWMAP={'guard':'guard','boost':'boost','hit dice':'hd','hit die':'hd',
 'boon':'boon','boons':'boon','bane':'bane','banes':'bane',
 'condition':'cond','conditions':'cond','status':'status','statuses':'status',
 'act':'act','acts':'act','react':'react','reacts':'react'};
const KWICON={act:ACT_IC,react:REACT_IC};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kwId(raw){return KWMAP[(raw||'').trim().toLowerCase()]||null;}
function titleCase(s){return (s||'').replace(/\b([a-z])/g,function(m,c){return c.toUpperCase();});}
function kwPill(text,id){
  const ic=KWICON[id]?('<span class="ic">'+KWICON[id]+'</span>'):'';
  return '<span class="kw kw-'+id+'">'+ic+esc(titleCase(text))+'</span>';
}
function inSkip(node){
  let p=node.parentElement;
  while(p){
    const tag=p.tagName, cl=' '+(p.className||'')+' ';
    if(tag==='STRONG') return true;
    if(/ kw /.test(cl)) return true;
    if(/(bf-stem-label|bf-foot|bf-head|bf-badge|bf-name|card-name|core-class-name|core-header|core-keyword|fclass|footer-left|footer-right|fright|cfooter|chead| ch |cbadge|cname|zone-label|clbl|elbl|srlbl|flbl|slbl|bf-choose|card-subtitle)/.test(cl)) return true;
    p=p.parentElement;
  }
  return false;
}
const SCAN_RE=/\b(Hit Dice|Hit Die|Guard|Boost|Boons?|Banes?|Conditions?|Statuses|Status|Acts?|Reacts?)\b/gi;
function scanText(bodyEl){
  if(!bodyEl) return;
  const walker=document.createTreeWalker(bodyEl,NodeFilter.SHOW_TEXT,null);
  const targets=[]; let n;
  while(n=walker.nextNode()){ if(n.nodeValue.trim() && !inSkip(n)) targets.push(n); }
  targets.forEach(function(tn){
    const txt=tn.nodeValue; let res='', last=0, m; SCAN_RE.lastIndex=0; let hit=false;
    while((m=SCAN_RE.exec(txt))){
      const w=m[0], lw=w.toLowerCase();
      if(lw==='act'||lw==='acts'||lw==='react'||lw==='reacts'){
        if(w[0]===w[0].toLowerCase()) continue; // lowercase verb -> not the card type
      }
      const id=kwId(w); if(!id) continue;
      res+=esc(txt.slice(last,m.index))+kwPill(w,id); last=m.index+w.length; hit=true;
    }
    if(hit){ res+=esc(txt.slice(last)); const sp=document.createElement('span'); sp.innerHTML=res; tn.replaceWith(sp); }
  });
}
function restyle(root){
  // 1. existing .tp / .tp-luck spans -> keyword pill or bold (keep crit-cost .tc)
  root.querySelectorAll('span.tp, span.tp-luck').forEach(function(sp){
    if(sp.classList.contains('tc')) return;
    const txt=sp.textContent, id=kwId(txt);
    if(id){ const tmp=document.createElement('span'); tmp.innerHTML=kwPill(txt,id); sp.replaceWith(tmp.firstChild); }
    else { const st=document.createElement('strong'); st.textContent=txt; sp.replaceWith(st); }
  });
  // 2. plain-text keyword scan in the body zone
  scanText(root.querySelector('.cbody, .card-body, .bf-body'));
  // 3. crit option: wrap trailing text after the cost so it wraps cleanly
  root.querySelectorAll('.ci').forEach(function(ci){
    const cost=ci.querySelector('.tc'); if(!cost) return;
    if(ci.querySelector('.ci-txt')) return;
    const wrap=document.createElement('span'); wrap.className='ci-txt';
    let nx=cost.nextSibling;
    while(nx){ const after=nx.nextSibling; wrap.appendChild(nx); nx=after; }
    ci.appendChild(wrap);
  });
  // 4. Act/React icons on the type badge + footer tier line
  root.querySelectorAll('.cb').forEach(function(b){
    const t=b.textContent.trim();
    if(t==='Act'){ b.innerHTML='<span class="ic">'+ACT_IC+'</span> Act'; b.classList.add('cb-act'); }
    else if(t==='React'){ b.innerHTML='<span class="ic">'+REACT_IC+'</span> React'; b.classList.add('cb-react'); }
  });
  root.querySelectorAll('.fright').forEach(function(f){
    f.innerHTML=f.innerHTML.replace(/(^|[^>])\bAct\b/, '$1'+ACT_IC+' Act').replace(/(^|[^>])\bReact\b/, '$1'+REACT_IC+' React');
  });
  return root;
}
function styleHTML(rawHtml){
  const d=document.createElement('div'); d.innerHTML=rawHtml; restyle(d); return d.innerHTML;
}
function prestyleAll(){ LIVE.forEach(function(c){ c.hs = styleHTML(c.h); }); }

/* ---------- gate ---------- */
function checkGate(){
  const v=document.getElementById('gatePass').value.trim();
  if(v===CONFIG.gatePassword || v===''){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('appHeader').classList.remove('hidden');
  } else document.getElementById('gateErr').textContent='Not quite - ask Annie for the password.';
}
document.getElementById('gatePass').addEventListener('keydown',e=>{if(e.key==='Enter')checkGate();});

/* ---------- helpers ---------- */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}
function classLabel(c){return c==='any'?'universal':c;}
function indexCards(){ LIVE.forEach(c=>byKey[c.k]=c); }
function cardHTML(c,opts){opts=opts||{};
  const sel=(opts.noSel||!deck.has(c.k))?'':' sel';
  const btn=opts.noBtn?'':opts.deckRemove?'<button class="deckbtn remove" onclick="event.stopPropagation();toggleDeck(\''+c.k+'\')" title="Remove from deck">✕</button>':'<button class="deckbtn" onclick="event.stopPropagation();toggleDeck(\''+c.k+'\')">'+(deck.has(c.k)?'✓':'+')+'</button>';
  const burst=(!opts.noBtn&&isRecentRework(c))?'<div class="rework-burst"><span class="burst-text">REWORKED<br>'+reworkLabel(c.rd)+'</span></div>':'';
  const zstyle=opts.zoom&&opts.zoom!='1'?' style="zoom:'+opts.zoom+'"':'';
  return '<div class="cardwrap scope-'+c.s+' cls-'+c.c+sel+'"'+zstyle+' data-key="'+c.k+'" onclick="openCard(\''+c.k+'\')">'+(c.hs||c.h)+btn+burst+'</div>';
}

/* ---------- sort / group ---------- */
function isLoadout(c){const m=/class="core-keyword"[^>]*>([^<]+)</.exec(c.h||'');return !!m&&m[1].trim().toUpperCase()==='LOADOUT';}
function cardTier(c){if(isLoadout(c))return 0;if(c.s==='core')return 1;return 2;}
function daysSince(ds){if(!ds)return null;return Math.floor((Date.now()-new Date(ds))/86400000);}
function reworkLabel(ds){const d=daysSince(ds);if(d===null)return '';if(d<=0)return 'TODAY';if(d===1)return '1 DAY AGO';return d+' DAYS AGO';}
function isRecentRework(c){const d=daysSince(c.rd);return d!==null&&d>=0&&d<=14;}
function buildGroupedHTML(cards,opts){
  opts=opts||{};
  const boonBuckets={},classBuckets={};
  cards.forEach(c=>{
    if(BOON_TYPE_ORDER.includes(c.t)){(boonBuckets[c.t]||(boonBuckets[c.t]=[])).push(c);}
    else{(classBuckets[c.c]||(classBuckets[c.c]=[])).push(c);}
  });
  let html='';
  BOON_TYPE_ORDER.forEach(type=>{
    const grp=boonBuckets[type];if(!grp||!grp.length)return;
    grp.sort((a,b)=>{const ra=isRecentRework(a)?0:1,rb=isRecentRework(b)?0:1;return ra!==rb?ra-rb:a.n.localeCompare(b.n);});
    html+='<div class="class-divider" style="--cls-color:'+(TYPE_PALETTE[type]||'#c8a96e')+'">'+type+'</div>';
    html+=grp.map(c=>cardHTML(c,opts)).join('');
  });
  const classes=Object.keys(classBuckets).sort();
  const multiCls=classes.length>1||Object.keys(boonBuckets).length>0;
  classes.forEach(cls=>{
    classBuckets[cls].sort((a,b)=>{const ta=cardTier(a),tb=cardTier(b);if(ta!==tb)return ta-tb;const ra=isRecentRework(a)?0:1,rb=isRecentRework(b)?0:1;return ra!==rb?ra-rb:a.n.localeCompare(b.n);});
    if(multiCls){const col=CONFIG.palette[cls]||'#c8a96e';html+='<div class="class-divider" style="--cls-color:'+col+'">'+cls.charAt(0).toUpperCase()+cls.slice(1)+'</div>';}
    html+=classBuckets[cls].map(c=>cardHTML(c,opts)).join('');
  });
  return html||'<div class="empty">No cards match these filters.</div>';
}

/* ---------- filters ---------- */
function buildChips(){
  const classes=[...new Set(LIVE.map(c=>c.c))].sort();
  const allTypes=[...new Set(LIVE.map(c=>c.t))];
  document.getElementById('classChips').innerHTML=classes.map(c=>'<button class="chip cls-'+c+'" onclick="toggleFilter(\'cls\',\''+c+'\',this)">'+classLabel(c)+'</button>').join('');
  const orderedBoon=BOON_TYPE_ORDER.filter(t=>allTypes.includes(t));
  const otherTypes=allTypes.filter(t=>!BOON_TYPE_ORDER.includes(t)&&!ACTION_TYPES.includes(t)&&t).sort();
  document.getElementById('typeChips').innerHTML=[...orderedBoon,...otherTypes].map(t=>'<button class="chip type-'+t.toLowerCase()+'" onclick="toggleFilter(\'type\',\''+t+'\',this)">'+t+'</button>').join('');
  document.getElementById('actionChips').innerHTML=ACTION_TYPES.filter(t=>allTypes.includes(t)).map(t=>'<button class="chip type-'+t.toLowerCase()+'" onclick="toggleFilter(\'type\',\''+t+'\',this)">'+{'Act':ACT_IC,'React':REACT_IC}[t]+' '+t+'</button>').join('');
}
function toggleFilter(kind,val,el){
  if(kind==='new'){filters.showNew=!filters.showNew;el.classList.toggle('on',filters.showNew);}
  else{const set=kind==='cls'?filters.cls:filters.type;if(set.has(val)){set.delete(val);el.classList.remove('on');}else{set.add(val);el.classList.add('on');}}
  applyFilters();
}
function resetFilters(){filters.cls.clear();filters.type.clear();filters.showNew=false;document.getElementById('search').value="";document.querySelectorAll('.chip.on').forEach(c=>c.classList.remove('on'));applyFilters();}
function filtered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  return LIVE.filter(c=>{
    if(filters.cls.size && !filters.cls.has(c.c))return false;
    if(filters.type.size && !filters.type.has(c.t))return false;
    if(filters.showNew && !isRecentRework(c))return false;
    if(q){const hay=(c.n+' '+c.h).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}
function applyFilters(){
  const list=filtered();
  document.getElementById('grid').innerHTML=list.length?buildGroupedHTML(list):'<div class="empty">No cards match these filters.</div>';
  document.getElementById('count').textContent=list.length+' of '+LIVE.length+' cards';
}

/* ---------- deck ---------- */
function loadDeck(){try{deck=new Set(JSON.parse(SS.getItem('irpg_deck')||'[]'));}catch(e){deck=new Set();}}
function saveDeck(){SS.setItem('irpg_deck',JSON.stringify([...deck]));syncBadges();}
function syncBadges(){document.getElementById('deckBadge').textContent=deck.size;document.getElementById('printN').textContent=deck.size;}
function toggleDeck(k){deck.has(k)?deck.delete(k):deck.add(k);saveDeck();refreshSelections();if(modalKey===k)renderModalButtons();}
function selectAllFiltered(){filtered().forEach(c=>deck.add(c.k));saveDeck();refreshSelections();toast('Added filtered cards to deck');}
function clearDeck(){deck.clear();saveDeck();refreshSelections();toast('Deck cleared');}
function refreshSelections(){
  document.querySelectorAll('.cardwrap').forEach(w=>{
    const k=w.dataset.key,on=deck.has(k);w.classList.toggle('sel',on);
    const b=w.querySelector('.deckbtn:not(.remove)');if(b)b.textContent=on?'✓':'+';
  });
  if(!document.getElementById('view-deck').classList.contains('hidden'))renderDeck();
}
function buildLaneHTML(groups,cardFn,idPfx,opts){
  opts=opts||{};
  var id=idPfx||'dlanes';
  var active=groups.filter(function(g){return g.cards.length;});
  var lanes=active.map(function(g,i){
    var lid=id+i;
    return '<div class="deck-lane" id="'+lid+'">'+
      '<div class="deck-lane-lbl">'+esc(g.lbl)+' <span>('+g.cards.length+')</span></div>'+
      '<div class="deck-lane-cards">'+g.cards.map(cardFn).join('')+'</div></div>';
  }).join('');
  var nav=active.map(function(g,i){
    var lid=id+i;
    var cls=g.chipClass?'chip '+g.chipClass:'deck-lane-navbtn';
    return '<button class="'+cls+'" onclick="(function(){var w=document.getElementById(\''+id+'\'),t=document.getElementById(\''+lid+'\');if(w&&t)w.scrollLeft=t.offsetLeft;})()">'+esc(g.lbl)+'</button>';
  }).join('');
  var navBar='<div class="deck-lane-nav'+(opts.navAtTop?' nav-top':'')+'">'+nav+'</div>';
  return '<div class="deck-lanes-wrap">'+(opts.navAtTop?navBar:'')+
    '<div class="deck-lanes" id="'+id+'">'+lanes+'</div>'+
    (opts.navAtTop?'':navBar)+'</div>';
}
function renderDeck(){
  const cards=[...deck].map(k=>byKey[k]).filter(Boolean);
  document.getElementById('deckSummary').textContent=cards.length?cards.length+' cards in deck.':'No cards yet.';
  if(!cards.length){document.getElementById('deckGrid').innerHTML='<div class="empty">Your deck is empty. Add cards from Browse.</div>';return;}
  const BOON_TYPES=['Background','Ancestry','Bond','Flaw','Trait'];
  const groups=[
    {lbl:'Core',       chipClass:'',                  cards:cards.filter(c=>c.s==='core')},
    {lbl:'Background', chipClass:'type-background',   cards:cards.filter(c=>c.t==='Background')},
    {lbl:'Ancestry',   chipClass:'type-ancestry',     cards:cards.filter(c=>c.t==='Ancestry')},
    {lbl:'Bond',       chipClass:'type-bond',         cards:cards.filter(c=>c.t==='Bond')},
    {lbl:'Flaw',       chipClass:'type-flaw',         cards:cards.filter(c=>c.t==='Flaw')},
    {lbl:'Traits',     chipClass:'type-trait',        cards:cards.filter(c=>c.t==='Trait')},
    {lbl:'Abilities',  chipClass:'',                  cards:cards.filter(c=>c.s!=='core'&&!BOON_TYPES.includes(c.t))},
  ];
  const cardFn=c=>cardHTML(c,{noSel:true,deckRemove:true});
  document.getElementById('deckGrid').innerHTML=buildLaneHTML(groups,cardFn,'dk',{navAtTop:true});
}

/* ---------- views ---------- */
function showView(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  if(v==='deck')renderDeck(); if(v==='sim')renderSim();
}

/* ---------- simulator (Mode B) ---------- */
let sim={pile:[],hand:[],coreCards:[],started:false};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function resetSim(){sim={pile:[],hand:[],coreCards:[],started:false};renderSim();}
function drawHand(){
  const allCards=[...deck].map(k=>byKey[k]).filter(Boolean);
  if(!allCards.length){toast('Build a deck first');return;}
  sim.coreCards=allCards.filter(c=>c.s==='core');
  const drawable=allCards.filter(c=>c.s!=='core');
  sim.pile=shuffle(drawable.slice());
  sim.hand=sim.pile.splice(0,Math.min(5,sim.pile.length));
  sim.started=true;
  renderSim();
}
function drawOne(){ if(!sim.started){drawHand();return;} if(!sim.pile.length){toast('Deck is empty');return;} sim.hand.unshift(sim.pile.shift());renderSim(); }
function renderSim(){
  const stat=document.getElementById('simStat'),dOne=document.getElementById('drawOneBtn');
  const coreArea=document.getElementById('simCoreArea'),handArea=document.getElementById('simHandArea');
  if(!sim.started){
    stat.textContent='Deck: '+deck.size+' cards ready.';
    coreArea.classList.add('hidden');
    handArea.innerHTML='<div class="grid"><div class="empty">Draw an opening hand to begin.</div></div>';
    dOne.disabled=deck.size<1;
    return;
  }
  if(sim.coreCards.length){
    coreArea.innerHTML='<div class="sim-core-label" title="Active Area cards are always in-play. These include Core cards and other Items or Objectives">Active Area</div>'+
      '<div class="grid">'+sim.coreCards.map(c=>cardHTML(c,{noBtn:true,noSel:true})).join('')+'</div>';
    coreArea.classList.remove('hidden');
  } else {
    coreArea.classList.add('hidden');
  }
  stat.textContent='Hand: '+sim.hand.length+' - Remaining in deck: '+sim.pile.length+(sim.pile.length===0?' (empty)':'');
  dOne.disabled=sim.pile.length===0;
  const handZoom=sim.hand.length>5?(5/sim.hand.length).toFixed(3):'1';
  handArea.innerHTML='<div class="sim-hand-label">Hand</div>'+
    '<div class="sim-hand-grid">'+sim.hand.map(c=>cardHTML(c,{noBtn:true,noSel:true,zoom:handZoom})).join('')+'</div>';
}

/* ---------- modal ---------- */
async function openCard(k){
  modalKey=k;modalVerIdx=0;const c=byKey[k];
  modalVersions=[{label:'Current',html:c.hs||styleHTML(c.h),since:c.u||''}];
  if(CONFIG.useLive){try{modalVersions=modalVersions.concat((await fetchVersions(k)).map(v=>({label:v.label,html:styleHTML(v.html),since:v.since})));}catch(e){}}
  renderModal();document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');modalKey=null;}
function renderModal(){
  const c=byKey[modalKey],v=modalVersions[modalVerIdx],multi=modalVersions.length>1;
  const isCurrent=modalVerIdx===0;
  const vNum=modalVersions.length-1-modalVerIdx;
  const toggleLabel=isCurrent?'Current':'v'+vNum+' of '+(modalVersions.length-1);
  const sheetW=Math.min(window.innerWidth*0.8,1600);
  const cardZoom=Math.max(1,Math.min(3,Math.round(sheetW*0.42/240*10)/10));
  const cardColW=Math.round(240*cardZoom);
  document.getElementById('modal').innerHTML='<div class="sheet" onclick="event.stopPropagation()">'+
    '<button class="closex" onclick="closeModal()">&times;</button>'+
    '<div class="sheet-card" style="flex:0 0 '+cardColW+'px;width:'+cardColW+'px">'+
      '<div class="modal-card-outer"><div class="modal-card-zoomed cardwrap scope-'+c.s+' cls-'+c.c+'" style="zoom:'+cardZoom+'">'+v.html+'</div></div>'+
      '<div class="vtoggle">'+
        '<button onclick="verStep(1)" '+(modalVerIdx>=modalVersions.length-1?'disabled':'')+'>&#9664;</button>'+
        '<span class="vlabel">'+esc(toggleLabel)+(isCurrent?' <span style="opacity:.5;font-size:10px">(current)</span>':'')+'</span>'+
        '<button onclick="verStep(-1)" '+(modalVerIdx<=0?'disabled':'')+'>&#9654;</button>'+
      '</div>'+
      '<div class="vnote">'+(!isCurrent?esc(v.label):'')+'</div>'+
    '</div>'+
    '<div class="sheet-side cls-'+c.c+'">'+
      '<h2>'+esc(c.n)+'</h2>'+
      '<div class="meta"><span class="meta-cls">'+classLabel(c.c)+'</span> - '+esc(c.t)+'</div>'+
      '<div class="sbtns" id="modalBtns"></div>'+
      '<div class="cmts" id="cmts"></div>'+
    '</div></div>';
  renderModalButtons();renderComments();
}
function verStep(d){modalVerIdx=Math.max(0,Math.min(modalVersions.length-1,modalVerIdx+d));renderModal();}
function renderModalButtons(){
  const c=byKey[modalKey],inDeck=deck.has(c.k);
  document.getElementById('modalBtns').innerHTML=
    '<button class="'+(inDeck?'':'primary')+'" onclick="toggleDeck(\''+c.k+'\')">'+(inDeck?'In deck - remove':'+ Add to deck')+'</button>'+
    '<button onclick="printOne(\''+c.k+'\')">Print this card</button>';
}

/* ---------- comments (sessionStorage preview; Baserow when live) ---------- */
function cmtKey(k){return 'irpg_cmt_'+k;}
function readComments(k,since){
  if(CONFIG.useLive)return fetchComments(k,since);
  try{return Promise.resolve(JSON.parse(SS.getItem(cmtKey(k))||'[]'));}catch(e){return Promise.resolve([]);}
}
async function renderComments(){
  const k=modalKey,since=(modalVersions[modalVerIdx]||{}).since||'';
  const list=await readComments(k,since),box=document.getElementById('cmts');if(!box)return;
  box.innerHTML='<h3>Comments ('+list.length+')</h3>'+
    (list.map(function(c,i){return '<div class="cmt"><div>'+esc(c.body)+'</div><div class="cmt-meta"><span class="who">'+esc(c.name||'Anon')+'</span><span class="when">'+esc(c.when||'')+'</span><button class="cmt-del" title="Delete comment" onclick="deleteComment(\''+k+'\','+i+')">\u2715</button></div><label class="cmt-chk'+(c.change?' on':'')+'"><input type="checkbox" '+(c.change?'checked':'')+' onchange="toggleChange(\''+k+'\','+i+',this.checked)"> apply this as a change on next push</label></div>';}).join('')||'<div class="meta">No comments yet.</div>')+
    '<div class="cmtform"><input id="cmtName" placeholder="Your name"><textarea id="cmtBody" placeholder="Leave feedback on this card..."></textarea><label class="cmt-chk"><input type="checkbox" id="cmtChange"> Mark as a change to apply to this card on the next push</label><button onclick="postComment(\''+k+'\')">Post comment</button></div>';
}
async function postComment(k){
  const name=(document.getElementById('cmtName').value||'').trim()||'Anon';
  const body=(document.getElementById('cmtBody').value||'').trim();
  if(!body){toast('Write a comment first');return;}
  const chk=document.getElementById('cmtChange');const change=!!(chk&&chk.checked);
  const entry={name,body,when:new Date().toLocaleString(),change};
  if(CONFIG.useLive){try{await postCommentLive(k,name,body,change);}catch(e){toast('Could not post');return;}}
  else{const cur=JSON.parse(SS.getItem(cmtKey(k))||'[]');cur.push(entry);SS.setItem(cmtKey(k),JSON.stringify(cur));}
  toast('Comment posted');renderComments();
}

/* ---------- print ---------- */
function printList(cards){
  if(!cards.length){toast('Nothing selected to print');return;}
  document.getElementById('printroot').innerHTML='<div class="print-sheet">'+cards.map(c=>'<div class="cardwrap scope-'+c.s+' cls-'+c.c+'">'+(c.hs||c.h)+'</div>').join('')+'</div>';
  window.print();
}
function printSelected(){printList([...deck].map(k=>byKey[k]).filter(Boolean));}
function printOne(k){printList([byKey[k]]);}

/* ---------- live Baserow (CONFIG.useLive) ---------- */
function authHeaders(){return {'Authorization':'Token '+CONFIG.readToken};}
async function fetchAll(tableId,params){
  let url=CONFIG.apiBase+tableId+'/?user_field_names=true&size=200'+(params||'');let out=[];
  while(url){const r=await fetch(url,{headers:authHeaders(),cache:'no-store'});const j=await r.json();out=out.concat(j.results||[]);url=j.next?j.next.replace('http://','https://'):null;}
  return out;
}
function guessSet(h){return /core-header/.test(h)?'core':/bf-head/.test(h)?'boon':'ability';}
function guessClass(h){const m=/class="(?:fclass|core-class-name)"[^>]*>([^<]+)</.exec(h||'');return m?m[1].toLowerCase():'any';}
function guessType(h){
  const b=/class="bf-badge"[^>]*>BOON\s*(?:&mdash;|-|—)\s*([A-Z]+)/.exec(h||'');
  if(b)return b[1].charAt(0)+b[1].slice(1).toLowerCase();
  const m=/class="cb"[^>]*>([^<]+)</.exec(h||'');
  if(m)return m[1].trim();
  if(/class="core-header"/.test(h||''))return 'Core';
  return '';
}
async function fetchCards(){
  const rows=await fetchAll(CONFIG.tableCards,'&filter__Status__single_select_equal=current');
  return rows
    .filter(r=>{const v=(r.Status&&r.Status.value)||r.Status||'';return v.toLowerCase()!=='legacy';})
    .map(r=>{const s=guessSet(r.HTML);return{k:r.Card_Key,n:r.Name,c:guessClass(r.HTML),t:guessType(r.HTML)||(s==='core'?'Core':''),s,h:r.HTML,u:r.updated_on||'',rd:r.Last_Rework_Date||''};});
}
async function fetchVersions(k){
  const rows=await fetchAll(CONFIG.tableVersions,'&filter__Card_Key__equal='+encodeURIComponent(k));
  return rows.sort((a,b)=>(b.Version_Date||'').localeCompare(a.Version_Date||'')).map(r=>{
    const date=(r.Version_Date||'').slice(0,10);
    const note=(r.Change_Note||'').trim();
    const label=note ? note+' ('+date+')' : date;
    return {label,html:r.HTML,since:r.Version_Date||''};
  });
}
async function fetchComments(k,since){
  const rows=await fetchAll(CONFIG.tableComments,'&filter__Card_Key__equal='+encodeURIComponent(k)+'&filter__Status__single_select_equal=visible');
  return rows
    .filter(r=>!since||(r.Created||'')>=since)
    .map(r=>({id:r.id,name:r.Commenter_Name,body:r.Body,when:(r.Created||'').slice(0,16),change:(((r.Change_Request||{}).value)||r.Change_Request)==='pending'}));
}
async function postCommentLive(k,name,body,change){
  const c=byKey[k];
  await fetch(CONFIG.apiBase+CONFIG.tableComments+'/?user_field_names=true',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},authHeaders()),body:JSON.stringify({Card_Key:k,Card_Name:c?c.n:'',Commenter_Name:name,Body:body,Status:'visible',Change_Request:change?'pending':null})});
}
function toggleChange(k,i,val){
  if(CONFIG.useLive){return toggleChangeLive(k,i,val);}
  const cur=JSON.parse(SS.getItem(cmtKey(k))||'[]');if(cur[i]){cur[i].change=val;SS.setItem(cmtKey(k),JSON.stringify(cur));}
  toast(val?'Flagged to apply on next push':'Unflagged');renderComments();
}
async function toggleChangeLive(k,i,val){
  try{const list=await fetchComments(k);const row=list[i];if(!row||!row.id)return;
    await fetch(CONFIG.apiBase+CONFIG.tableComments+'/'+row.id+'/?user_field_names=true',{method:'PATCH',headers:Object.assign({'Content-Type':'application/json'},authHeaders()),body:JSON.stringify({Change_Request:val?'pending':null})});
    toast(val?'Flagged to apply on next push':'Unflagged');renderComments();
  }catch(e){toast('Could not update (needs write access on Comments)');}
}
function deleteComment(k,i){
  if(!window.confirm('Delete this comment? This cannot be undone.'))return;
  if(CONFIG.useLive){return deleteCommentLive(k,i);}
  const cur=JSON.parse(SS.getItem(cmtKey(k))||'[]');cur.splice(i,1);SS.setItem(cmtKey(k),JSON.stringify(cur));
  toast('Comment deleted');renderComments();
}
async function deleteCommentLive(k,i){
  try{const list=await fetchComments(k);const row=list[i];if(!row||!row.id)return;
    await fetch(CONFIG.apiBase+CONFIG.tableComments+'/'+row.id+'/',{method:'DELETE',headers:authHeaders()});
    toast('Comment deleted');renderComments();
  }catch(e){toast('Could not delete (needs delete access on Comments)');}
}
async function loadCards(){
  document.getElementById('grid').innerHTML='<div class="empty">Loading cards…</div>';
  try{
    const cards=await fetchCards();
    LIVE=cards;
    LIVE.forEach(c=>{c.hs=styleHTML(c.h);});
    LIVE.forEach(c=>{byKey[c.k]=c;});
    buildChips();applyFilters();syncBadges();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty">Could not load cards — check token and connection.</div>';
  }
}

async function reload(){
  toast('Refreshing…');
  await loadCards();
  toast('Cards refreshed.');
}

/* ---------- init ---------- */
async function init(){
  loadDeck();
  await loadCards();
}
init();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ===== ONBOARDING FLOW ===== */
const CLASSES = [
  {id:'barbarian', name:'Barbarian', color:'#9E2B2B', tagline:'Eat every hit and make them pay for it.'},
  {id:'bard',      name:'Bard',      color:'#B5388D', tagline:'Steal the spotlight — or hand it to someone who needs it.'},
  {id:'cleric',    name:'Cleric',    color:'#5E81AC', tagline:'Bank your faith and spend it when it counts.'},
  {id:'druid',     name:'Druid',     color:'#5A7D2A', tagline:'Shift shape and grow stronger from every setback.'},
  {id:'fighter',   name:'Fighter',   color:'#B45309', tagline:'Gear up, share your edge, and never leave an ally exposed.'},
  {id:'paladin',   name:'Paladin',   color:'#B8860B', tagline:'Your oath is a weapon — and your body is the shield.'},
  {id:'ranger',    name:'Ranger',    color:'#2F6B3D', tagline:'The fight is already won before it starts.'},
  {id:'rogue',     name:'Rogue',     color:'#6C5BA8', tagline:'Two decks, one shadow, zero witnesses.'},
  {id:'warlock',   name:'Warlock',   color:'#9A2B5E', tagline:'Your body is the price — and you keep paying.'},
];

let ob = {active:false,step:1,deck:new Set(),cls:null,pool:[],traitRound:0,traitPool:[],traitDeck:[]};

function startOnboarding(){
  if(!LIVE.length){toast('Cards are still loading…');return;}
  ob={active:true,step:1,deck:new Set(),cls:null,pool:[],traitRound:0,traitPool:[],traitDeck:[]};
  document.getElementById('ob-overlay').classList.remove('hidden');
  renderObStep();
}

function closeOnboarding(){
  document.getElementById('ob-overlay').classList.add('hidden');
  ob.active=false;
}

function obPct(s){return Math.round((s-1)/9*100);}

function obHead(title,lbl){
  return '<div class="ob-header"><div><div class="ob-title">'+esc(title)+'</div><div class="ob-step-lbl">'+esc(lbl)+'</div></div>'+
    '<button class="ob-skip" onclick="closeOnboarding()">✕ Skip setup</button></div>'+
    '<div class="ob-progress"><div class="ob-progress-fill" style="width:'+obPct(ob.step)+'%"></div></div>';
}

function renderObStep(){
  const el=document.getElementById('ob-inner');
  if(!el)return;
  switch(ob.step){
    case 1:el.innerHTML=obStep1();break;
    case 2:el.innerHTML=obStep2();break;
    case 3:el.innerHTML=obStep3();break;
    case 4:el.innerHTML=obStep4();break;
    case 5:el.innerHTML=obStep5();break;
    case 6:el.innerHTML=obStep6();break;
    case 7:el.innerHTML=obStep7();break;
    case 8:el.innerHTML=obStep8();break;
    case 9:el.innerHTML=obStep9();break;
    default:obFinish();
  }
  document.getElementById('ob-overlay').scrollTop=0;
}

/* STEP 1 — Class */
function obStep1(){
  const tiles=CLASSES.map(function(cl){
    const n=LIVE.filter(function(c){return c.s==='core'&&c.c===cl.id;}).length;
    return '<div class="ob-class-tile" style="border-color:'+cl.color+'" onclick="obPickClass(\''+cl.id+'\')">'+
      '<div class="ob-class-name" style="color:'+cl.color+'">'+esc(cl.name)+'</div>'+
      '<div class="ob-class-tag">'+esc(cl.tagline)+'</div>'+
      '<div class="ob-class-count">'+n+' core cards included</div></div>';
  }).join('');
  return obHead('Choose Your Class','Step 1 of 9')+
    '<div class="ob-subtext">Your class defines your core mechanics. All core cards are added automatically when you pick.</div>'+
    '<div class="ob-class-grid">'+tiles+'</div>';
}

function obPickClass(id){
  ob.cls=id;
  LIVE.filter(function(c){return c.s==='core'&&c.c===id;}).forEach(function(c){ob.deck.add(c.k);});
  ob.step=2;ob.pool=obSample('Background',5);
  renderObStep();
}

/* Random sampling */
function obSample(type,n){
  var pool=LIVE.filter(function(c){return c.t===type;});
  var sh=pool.slice().sort(function(){return Math.random()-.5;});
  return sh.slice(0,n);
}
function obSample3(type){
  var pool=LIVE.filter(function(c){return c.t===type;});
  var sh=pool.slice().sort(function(){return Math.random()-.5;});
  return sh.slice(0,3);
}

/* Generic pick-from-5 renderer */
function obPickPanel(title,lbl,type,nextStep){
  var cards=ob.pool.map(function(c){
    return '<div class="ob-card-option" onclick="obPickCard(\''+c.k+'\','+nextStep+',\''+type+'\')">'+
      '<div class="cardwrap scope-'+c.s+' cls-'+c.c+'" style="cursor:pointer">'+(c.hs||c.h)+'</div></div>';
  }).join('');
  return obHead(title,lbl)+
    '<div class="ob-subtext">Tap a card to add it to your deck. You can reroll as many times as you like.</div>'+
    '<div class="ob-cards-row">'+cards+'</div>'+
    '<div class="ob-btns"><button class="ob-btn" onclick="ob.pool=obSample(\''+type+'\',5);renderObStep()">↻ Reroll</button></div>';
}

function obStep2(){return obPickPanel('Choose a Background','Step 2 of 9','Background',3);}
function obStep3(){return obPickPanel('Choose an Ancestry','Step 3 of 9','Ancestry',4);}
function obStep4(){return obPickPanel('Choose a Bond','Step 4 of 9','Bond',5);}
function obStep5(){return obPickPanel('Choose a Flaw','Step 5 of 9','Flaw',6);}

function obPickCard(key,nextStep,_type){
  ob.deck.add(key);
  ob.step=nextStep;
  if(nextStep===3){ob.pool=obSample('Ancestry',5);}
  else if(nextStep===4){ob.pool=obSample('Bond',5);}
  else if(nextStep===5){ob.pool=obSample('Flaw',5);}
  else if(nextStep===6){ob.traitRound=0;ob.traitDeck=LIVE.filter(function(c){return c.t==='Trait';}).slice().sort(function(){return Math.random()-.5;});ob.traitPool=ob.traitDeck.splice(0,3);}
  renderObStep();
}

/* STEP 6 — Traits × 5 rounds */
function obStep6(){
  var round=ob.traitRound+1;
  var cards=ob.traitPool.map(function(c){
    return '<div class="ob-card-option" onclick="obPickTrait(\''+c.k+'\')">'+
      '<div class="cardwrap scope-'+c.s+' cls-'+c.c+'" style="cursor:pointer">'+(c.hs||c.h)+'</div></div>';
  }).join('');
  return obHead('Choose a Trait','Step 6 of 9 — Round '+round+' of 5')+
    '<div class="ob-round-lbl">Round '+round+' of 5 — Pick 1 trait to keep.</div>'+
    '<div class="ob-cards-row">'+cards+'</div>';
}

function obPickTrait(key){
  ob.deck.add(key);
  ob.traitRound++;
  if(ob.traitRound<5){ob.traitPool=ob.traitDeck.splice(0,3);renderObStep();}
  else{ob.step=7;renderObStep();}
}

/* STEP 7 — Class-Specific Placeholder */
function obStep7(){
  var cl=CLASSES.find(function(c){return c.id===ob.cls;});
  var name=cl?cl.name+' ':'';
  return obHead('Class Setup','Step 7 of 9')+
    '<div class="ob-placeholder">'+
      '<div class="ob-placeholder-icon">⚙️</div>'+
      '<div class="ob-placeholder-title">'+esc(name)+'Special Setup</div>'+
      '<div class="ob-placeholder-body">Your class has a special setup step — coming soon!<br>This will be customized per class (e.g. Warlock picks a patron).</div>'+
    '</div>'+
    '<div class="ob-btns"><button class="ob-btn primary" onclick="ob.step=8;renderObStep()">Continue →</button></div>';
}

/* STEP 8 — Item Placeholder */
function obStep8(){
  return obHead('Choose an Item','Step 8 of 9')+
    '<div class="ob-placeholder">'+
      '<div class="ob-placeholder-icon">⚔️</div>'+
      '<div class="ob-placeholder-title">Item Selection</div>'+
      '<div class="ob-placeholder-body">Item cards don\'t exist yet — coming soon!<br>Check back after the next content update.</div>'+
    '</div>'+
    '<div class="ob-btns"><button class="ob-btn primary" onclick="ob.step=9;renderObStep()">Continue →</button></div>';
}

/* STEP 9 — Deck Review */
function obStep9(){
  var all=[...ob.deck].map(function(k){return byKey[k];}).filter(Boolean);
  var groups=[
    {lbl:'Core Cards',cards:all.filter(function(c){return c.s==='core';})},
    {lbl:'Background',cards:all.filter(function(c){return c.t==='Background';})},
    {lbl:'Ancestry',  cards:all.filter(function(c){return c.t==='Ancestry';})},
    {lbl:'Bond',      cards:all.filter(function(c){return c.t==='Bond';})},
    {lbl:'Flaw',      cards:all.filter(function(c){return c.t==='Flaw';})},
    {lbl:'Traits',    cards:all.filter(function(c){return c.t==='Trait';})},
  ];
  var cardFn=function(c){
    return '<div class="cardwrap scope-'+c.s+' cls-'+c.c+'" style="cursor:default">'+(c.hs||c.h)+'</div>';
  };
  return obHead('Deck Review','Final Step')+
    '<div class="ob-subtext">'+all.length+' cards in your starting deck. Review below, then confirm to begin playing.</div>'+
    buildLaneHTML(groups,cardFn,'ob')+
    '<div class="ob-btns"><button class="ob-btn primary" onclick="obFinish()">✓ Confirm Deck &amp; Start Playing</button></div>';
}

/* STEP 10 — Confirm */
function obFinish(){
  ob.deck.forEach(function(k){deck.add(k);});
  saveDeck();
  closeOnboarding();
  showView('sim');
  toast('Deck ready — draw your opening hand to begin!');
}
/* ===== END ONBOARDING ===== */
</script>
