<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instinct RPG — Card Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="parallelism-pass/canon_keywords.css">
<link rel="stylesheet" href="parallelism-pass/canon_accents.css">
<style>
/* ── Reset & root ─────────────────────────────────────────────── */
:root {
  --ink: #1e1810;
  --parch: #f4ecd8;
  --gold: #c8a96e;
  --gold-d: #7a6030;
  --bg: #16110a;
  --panel: #1a1108;
  --panel2: #211810;
  --border: #3a2c19;
  --text: #f0e6cf;
  --text-dim: #bfae86;
  --modified: #f0b440;
  --new: #4fae6c;
  --danger: #c84444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 13px; }

/* ── Layout ───────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

header {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 9px 16px; background: var(--panel); border-bottom: 2px solid var(--gold);
  flex-shrink: 0; z-index: 10;
}
.brand { color: var(--gold); letter-spacing: 2px; font-size: 14px; text-transform: uppercase; font-weight: 700; }
.spacer { flex: 1; }
.hbtn {
  background: var(--panel2); border: 1px solid var(--gold-d); color: var(--gold);
  padding: 6px 13px; border-radius: 6px; font-size: 12px; letter-spacing: .5px;
}
.hbtn:hover { background: #3a2814; }
.hbtn.primary { background: var(--gold); color: #1a1108; border-color: var(--gold); font-weight: 700; }
.hbtn.primary:hover { background: #dfc080; }
.hbtn.danger { background: #3a1414; border-color: #6a2020; color: #e08080; }
.hbtn.danger:hover { background: #501a1a; }
#pendingBadge {
  display: inline-block; min-width: 20px; padding: 0 6px; border-radius: 10px;
  background: var(--modified); color: #1a1108; font-size: 11px; font-weight: 700;
  text-align: center; line-height: 20px; height: 20px;
}
#pendingBadge.hidden { display: none; }

.main { display: flex; flex: 1; min-height: 0; }

/* ── Left panel ──────────────────────────────────────────────── */
#leftPanel {
  width: 300px; flex-shrink: 0; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; background: #180f08;
}
.filter-section { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; }
.filter-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.flabel { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gold-d); min-width: 44px; }
.fchip {
  background: #241a0f; border: 1px solid #3a2c19; color: var(--text-dim);
  padding: 3px 9px; border-radius: 12px; font-size: 11px; text-transform: capitalize;
}
.fchip:hover { border-color: var(--gold-d); }
.fchip.on { background: var(--gold); color: #1a1108; border-color: var(--gold); font-weight: 700; }
#searchInput {
  width: 100%; padding: 7px 10px; background: #241a0f; border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; font-size: 13px; outline: none;
}
#searchInput:focus { border-color: var(--gold-d); }
#cardCount { font-size: 11px; color: var(--gold-d); }

.list-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 6px; border-bottom: 1px solid var(--border);
}
.list-header span { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gold-d); }
#newCardBtn {
  background: var(--new); color: #fff; border: none; padding: 4px 10px;
  border-radius: 5px; font-size: 11px; font-weight: 700;
}
#newCardBtn:hover { background: #3d9060; }

#cardList { flex: 1; overflow-y: auto; }
#cardList::-webkit-scrollbar { width: 5px; }
#cardList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.card-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; border-bottom: 1px solid #1e1510; position: relative;
}
.card-item:hover { background: #221810; }
.card-item.selected { background: #2a1d10; border-left: 3px solid var(--gold); padding-left: 9px; }
.card-item.modified::after {
  content: ''; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%; background: var(--modified);
}
.card-item.new-card::after { background: var(--new); }
.card-name { flex: 1; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.type-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0; border: 1px solid;
}
.badge-act    { border-color: #1D4ED8; color: #93b8ff; }
.badge-react  { border-color: #6D28D9; color: #c4b0e8; }
.badge-core   { border-color: #8a6608; color: #e0c040; }
.badge-condition { border-color: #6C5BA8; color: #b0a0e0; }
.badge-other  { border-color: var(--gold-d); color: var(--text-dim); }

/* ── Right panel ─────────────────────────────────────────────── */
#rightPanel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#emptyState {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--gold-d);
}
#emptyState .big { font-size: 32px; opacity: .3; }
#emptyState p { font-size: 14px; }

#editArea { display: none; flex: 1; flex-direction: column; overflow: hidden; }
#editArea.active { display: flex; }

/* Edit + Preview split */
.edit-preview-split { display: flex; flex: 1; min-height: 0; gap: 0; }

/* Form section */
#formSection {
  width: 50%; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 1px solid var(--border); overflow-y: auto;
}
#formSection::-webkit-scrollbar { width: 5px; }
#formSection::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.form-header {
  padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
  background: var(--panel); display: flex; align-items: center; gap: 8px;
}
.form-header h2 { font-size: 14px; color: var(--gold); }
.modified-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
  background: var(--modified); color: #1a1108; display: none;
}
.modified-tag.show { display: inline; }
.new-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
  background: var(--new); color: #fff; display: none;
}
.new-tag.show { display: inline; }

.form-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.form-row { display: flex; gap: 8px; align-items: flex-start; }
.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold-d); }
.form-group input,
.form-group select,
.form-group textarea {
  background: var(--panel2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 9px; border-radius: 6px; outline: none; width: 100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--gold-d); }
.form-group select option { background: #221810; }
.form-group textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
#effectText { min-height: 200px; font-size: 12px; }
#changeNote { min-height: 50px; }

.key-row { display: flex; align-items: center; gap: 6px; }
.key-row input { flex: 1; }
#editKeyBtn {
  background: #241a0f; border: 1px solid var(--border); color: var(--text-dim);
  padding: 7px 9px; border-radius: 6px; font-size: 11px; flex-shrink: 0;
}
#editKeyBtn:hover { color: var(--gold); border-color: var(--gold-d); }

.form-actions {
  padding: 10px 14px; border-top: 1px solid var(--border); background: var(--panel);
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.form-actions .hint { font-size: 11px; color: var(--gold-d); flex: 1; }

/* Preview section */
#previewSection {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #13100a;
}
.preview-header {
  padding: 9px 14px; border-bottom: 1px solid var(--border); background: var(--panel);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.preview-header span { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gold-d); }
#previewToggle {
  background: #241a0f; border: 1px solid var(--border); color: var(--text-dim);
  padding: 3px 10px; border-radius: 4px; font-size: 11px;
}
#previewToggle:hover { color: var(--gold); }

#previewScroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; align-items: center; }
#previewScroll::-webkit-scrollbar { width: 5px; }
#previewScroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Card rendering in preview */
#cardPreviewWrap {
  /* provides scope for card CSS that needs a parent class */
}
#cardPreviewWrap .card {
  position: relative; width: 240px; height: 336px; background: #f7f0e0;
  border-radius: 8px; border: 1.5px solid #c8a96e;
  display: flex; flex-direction: column; overflow: hidden; z-index: 1;
  box-shadow: 4px 4px 0 rgba(0,0,0,.5);
}
/* Card structure styles (canonical from card viewer) */
#cardPreviewWrap .hdr {
  padding: 7px 9px 5px; display: flex; flex-direction: column; gap: 2px;
  flex-shrink: 0; background: var(--ah, #faf6ec); border-bottom: 1px solid rgba(0,0,0,.10);
}
#cardPreviewWrap .hdr-top {
  display: flex; justify-content: space-between; align-items: center; gap: 6px; min-height: 16px;
}
#cardPreviewWrap .cap {
  display: inline-flex; align-items: center; border: 1.5px solid; border-radius: 4px;
  padding: 1px 7px; font-size: 9px; font-weight: 800; letter-spacing: .6px;
  text-transform: uppercase; font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.35; white-space: nowrap;
}
#cardPreviewWrap .cap-neutral { border-color: #3a3320; color: #3a3320; }
#cardPreviewWrap .cap-accent  { border-color: var(--ad); color: var(--ad); }
#cardPreviewWrap .hdr-name {
  font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-weight: 700;
  font-size: 16.5px; line-height: 1.08; text-align: center; padding: 3px 12px;
  margin: 6px -1px 2px; color: var(--ad); background: var(--al);
  border-top: 2px solid var(--a); border-bottom: 2px solid var(--a);
  clip-path: polygon(0 0,100% 0,calc(100% - 11px) 50%,100% 100%,0 100%,11px 50%);
}
#cardPreviewWrap .hdr-sub {
  text-align: center; font-style: italic; font-size: 8.5px; color: #6a5b38;
  line-height: 1.22; margin-top: 2px;
}
#cardPreviewWrap .cbody {
  flex: 1; padding: 7px 10px 5px; display: flex; flex-direction: column; min-height: 0;
}
#cardPreviewWrap .bf-body,
#cardPreviewWrap .card-body {
  flex: 1; padding: 7px 10px; display: flex; flex-direction: column; gap: 5px; min-height: 0; overflow: hidden;
}
#cardPreviewWrap .flv { font-size: 10.45px; font-style: italic; color: #5a4020; line-height: 1.4; margin-bottom: 5px; flex-shrink: 0; }
#cardPreviewWrap .hr  { height: 0.5px; background: #c8a96e; opacity: 0.4; margin: 4px 0; flex-shrink: 0; }
#cardPreviewWrap .rule { height: 0.5px; background: rgba(180,140,60,.3); flex-shrink: 0; }
#cardPreviewWrap .zone-label {
  font-size: 7.7px; letter-spacing: 1.5px; text-transform: uppercase;
  color: #8a6a30; flex-shrink: 0; margin-top: 2px;
}
#cardPreviewWrap .effect-text { font-size: 10.45px; line-height: 1.5; color: #1a1008; flex-shrink: 0; }
#cardPreviewWrap .effect-text em { color: #5a4a20; }
#cardPreviewWrap .etxt { font-size: 11px; line-height: 1.5; color: #1c1408; flex-shrink: 0; }
#cardPreviewWrap .etxt em { font-style: italic; color: #3a2a0a; }
#cardPreviewWrap .etxt + .etxt { margin-top: 4px; }
#cardPreviewWrap .elbl {
  font-size: 8.25px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: #7a6030; margin-bottom: 3px; flex-shrink: 0;
}
#cardPreviewWrap .idtag {
  position: absolute; left: 8px; bottom: 7px; border: 1.5px solid var(--a); color: var(--ad);
  background: var(--at); border-radius: 4px; padding: 1px 7px; font-size: 9px; font-weight: 800;
  letter-spacing: .6px; text-transform: uppercase; font-family: system-ui, -apple-system, sans-serif; line-height: 1.35;
}
#cardPreviewWrap .tier-float {
  position: absolute; right: 8px; bottom: 7px; width: 18px; height: 18px;
  border: 1px solid #9a9a9a; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #7d7d7d; font-family: Georgia, serif; font-style: italic; background: rgba(255,255,255,.55);
}
/* cls border overrides */
#cardPreviewWrap .cls-barbarian .card { border-left: 5px solid #9E2B2B; }
#cardPreviewWrap .cls-fighter  .card { border-left: 5px solid #B45309; }
#cardPreviewWrap .cls-paladin  .card { border-left: 5px solid #B8860B; }
#cardPreviewWrap .cls-cleric   .card { border-left: 5px solid #5E81AC; }
#cardPreviewWrap .cls-ranger   .card { border-left: 5px solid #2F6B3D; }
#cardPreviewWrap .cls-rogue    .card { border-left: 5px solid #6C5BA8; }
#cardPreviewWrap .cls-druid    .card { border-left: 5px solid #5A7D2A; }
#cardPreviewWrap .cls-warlock  .card { border-left: 5px solid #9A2B5E; }
#cardPreviewWrap .cls-bard     .card { border-left: 5px solid #B5388D; }
#cardPreviewWrap .cls-wizard   .card { border-left: 5px solid #3C3489; }
#cardPreviewWrap .cls-monk     .card { border-left: 5px solid #164E63; }
/* Core card header style */
#cardPreviewWrap .core-header {
  padding: 7px 10px 6px; display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; border-bottom: 2px solid rgba(0,0,0,.2);
}
#cardPreviewWrap .core-keyword {
  font-size: 9.9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: #f5ead4; background: rgba(0,0,0,.3); padding: 2px 6px; border-radius: 2px;
}
#cardPreviewWrap .card-name-zone {
  padding: 7px 10px 5px; border-bottom: 1px solid rgba(0,0,0,.12); flex-shrink: 0;
  background: rgba(255,255,255,.08);
}
#cardPreviewWrap .card-name {
  font-size: 12.65px; font-weight: 700; color: #1a1008; letter-spacing: .3px;
  text-transform: uppercase; line-height: 1.2;
}
#cardPreviewWrap .card-subtitle { font-size: 9.35px; color: #6a5030; font-style: italic; margin-top: 1px; line-height: 1.3; }
#cardPreviewWrap .card-body .cbody { padding-bottom: 26px; }
/* Padding bottom override for all body types in preview */
#cardPreviewWrap .card .cbody,
#cardPreviewWrap .card .bf-body,
#cardPreviewWrap .card .card-body { padding-bottom: 26px; }

/* Keyword preview panel */
#kwPreview {
  background: #1a1408; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; max-width: 260px; width: 100%;
}
#kwPreview .kp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold-d); margin-bottom: 8px; }
#kwPreview .kp-body { font-size: 11px; line-height: 1.6; color: #2a1e08; background: #f5ead4; padding: 8px 10px; border-radius: 5px; min-height: 40px; }

/* ── Toast ───────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #2f7d4f; color: #fff; padding: 9px 18px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: opacity .2s; z-index: 500; pointer-events: none;
}
#toast.show { opacity: 1; }
#toast.err { background: var(--danger); }

/* ── New card modal ──────────────────────────────────────────── */
#newCardModal {
  position: fixed; inset: 0; background: rgba(10,7,3,.82); z-index: 200;
  display: none; align-items: center; justify-content: center;
}
#newCardModal.show { display: flex; }
.modal-box {
  background: #221810; border: 1px solid var(--gold-d); border-radius: 12px;
  padding: 24px; width: 460px; max-width: 90vw; display: flex; flex-direction: column; gap: 14px;
}
.modal-box h2 { color: var(--gold); font-size: 16px; }
.modal-row { display: flex; gap: 10px; }
.modal-row .form-group { flex: 1; }
.modal-box label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold-d); display: block; margin-bottom: 4px; }
.modal-box input,
.modal-box select {
  background: var(--panel2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 9px; border-radius: 6px; width: 100%; font-size: 13px;
}
.modal-box select option { background: #221810; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header>
    <div class="brand">🃏 Card Editor</div>
    <span id="cardCount" style="color:var(--gold-d);font-size:12px;"></span>
    <div class="spacer"></div>
    <span id="pendingBadge" class="hidden" title="Unsaved edits in queue"></span>
    <button class="hbtn" id="clearEditsBtn" title="Discard all pending edits" style="display:none;">Clear All Edits</button>
    <button class="hbtn primary" id="syncBtn" title="Write card-edits.json to repo for Claude to sync">Sync to Baserow</button>
    <button class="hbtn" id="refreshBtn" title="Reload card-data.js (after Claude updates it)">Refresh Data</button>
  </header>

  <div class="main">
    <!-- LEFT PANEL: Filters + Card List -->
    <div id="leftPanel">
      <div class="filter-section">
        <div class="filter-row">
          <span class="flabel">Class</span>
          <div id="classFilters" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
        </div>
        <div class="filter-row">
          <span class="flabel">Type</span>
          <div id="typeFilters" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
        </div>
        <div class="filter-row">
          <input type="text" id="searchInput" placeholder="Search cards…" autocomplete="off">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);cursor:pointer;">
            <input type="checkbox" id="showModified" style="accent-color:var(--modified);"> Modified only
          </label>
          <span id="cardCount2" style="margin-left:auto;"></span>
        </div>
      </div>
      <div class="list-header">
        <span id="listCountLabel">Cards</span>
        <button id="newCardBtn">+ New Card</button>
      </div>
      <div id="cardList"></div>
    </div>

    <!-- RIGHT PANEL: Edit Form + Preview -->
    <div id="rightPanel">
      <!-- Empty state -->
      <div id="emptyState">
        <div class="big">🃏</div>
        <p>Select a card from the list to edit it</p>
        <p style="font-size:12px;color:var(--gold-d);">Or click <strong style="color:var(--new);">+ New Card</strong> to create one</p>
      </div>

      <!-- Edit area -->
      <div id="editArea">
        <div class="edit-preview-split">

          <!-- FORM SECTION -->
          <div id="formSection">
            <div class="form-header">
              <h2 id="formTitle">Edit Card</h2>
              <span id="modifiedTag" class="modified-tag">Modified</span>
              <span id="newTag" class="new-tag">New</span>
            </div>
            <div class="form-body">
              <!-- Row 1: Name + Status -->
              <div class="form-row">
                <div class="form-group" style="flex:2;">
                  <label for="fName">Name</label>
                  <input type="text" id="fName" placeholder="Card Name">
                </div>
                <div class="form-group">
                  <label for="fStatus">Status</label>
                  <select id="fStatus">
                    <option value="current">current</option>
                    <option value="legacy">legacy</option>
                  </select>
                </div>
              </div>

              <!-- Row 2: Card Key -->
              <div class="form-group">
                <label for="fKey">Card Key (slug)</label>
                <div class="key-row">
                  <input type="text" id="fKey" placeholder="card-name-type" readonly>
                  <button id="editKeyBtn" title="Unlock to edit key">✏️</button>
                </div>
              </div>

              <!-- Row 3: Class + Type + Scope -->
              <div class="form-row">
                <div class="form-group">
                  <label for="fClass">Class</label>
                  <select id="fClass">
                    <option value="any">any</option>
                    <option value="barbarian">Barbarian</option>
                    <option value="fighter">Fighter</option>
                    <option value="paladin">Paladin</option>
                    <option value="cleric">Cleric</option>
                    <option value="ranger">Ranger</option>
                    <option value="rogue">Rogue</option>
                    <option value="druid">Druid</option>
                    <option value="warlock">Warlock</option>
                    <option value="bard">Bard</option>
                    <option value="wizard">Wizard</option>
                    <option value="monk">Monk</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="fType">Card Type</label>
                  <select id="fType">
                    <option value="Act">Act</option>
                    <option value="React">React</option>
                    <option value="Core">Core</option>
                    <option value="Condition">Condition</option>
                    <option value="Background">Background</option>
                    <option value="Bond">Bond</option>
                    <option value="Flaw">Flaw</option>
                    <option value="Ancestry">Ancestry</option>
                    <option value="Instinct">Instinct</option>
                    <option value="Connection">Connection</option>
                    <option value="Item">Item</option>
                  </select>
                </div>

<!-- Card data (generated by Claude from Baserow) -->
<script src="card-data.js"></script>
<script>
/* ── Constants ─────────────────────────────────────────────────── */
const LS_KEY = 'instinct_card_edits_v1';
const TODAY = new Date().toISOString().slice(0, 10);

/* ── State ─────────────────────────────────────────────────────── */
let allCards = window.CARD_DATA || [];
let pendingEdits = {}; // card_key -> edited card object
let newCards = [];     // array of entirely new card objects
let selectedKey = null;
let selectedIsNew = false;
let classFilter = null;
let typeFilter = null;
let searchText = '';
let showModifiedOnly = false;
let keyUnlocked = false;
let showStoredHtml = false;
let dirHandle = null;

/* ── Constants ─────────────────────────────────────────────────── */
const PLAYER_CLASSES = new Set(['barbarian','fighter','paladin','cleric','ranger','rogue','druid','warlock','bard','wizard','monk']);

/* ── Init ──────────────────────────────────────────────────────── */
function init() {
  loadEditsFromStorage();
  buildFilters();
  renderList();
  wireEvents();
  updatePendingBadge();
  document.getElementById('fDate').value = TODAY;
}

/* ── Persistence (localStorage) ────────────────────────────────── */
function loadEditsFromStorage() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      pendingEdits = parsed.edits || {};
      newCards = parsed.newCards || [];
    }
  } catch(e) { /* ignore */ }
}

function saveEditsToStorage() {
  localStorage.setItem(LS_KEY, JSON.stringify({ edits: pendingEdits, newCards }));
}

/* ── Build Filters ─────────────────────────────────────────────── */
function buildFilters() {
  // Only show actual player classes; non-class cards (Background, Bond, etc.) bucket into "any"
  const classes = [...new Set(allCards.map(c =>
    PLAYER_CLASSES.has(c.Class) ? c.Class : 'any'
  ))].filter(Boolean).sort();
  const types   = [...new Set(allCards.map(c => c.Card_Type))].filter(Boolean).sort();

  const cf = document.getElementById('classFilters');
  classes.forEach(cls => {
    const btn = document.createElement('button');
    btn.className = 'fchip';
    btn.textContent = cls;
    btn.dataset.cls = cls;
    btn.onclick = () => { classFilter = classFilter === cls ? null : cls; btn.classList.toggle('on'); renderList(); };
    cf.appendChild(btn);
  });

  const tf = document.getElementById('typeFilters');
  types.forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'fchip';
    btn.textContent = type;
    btn.dataset.type = type;
    btn.onclick = () => { typeFilter = typeFilter === type ? null : type; btn.classList.toggle('on'); renderList(); };
    tf.appendChild(btn);
  });
}

/* ── Card List ─────────────────────────────────────────────────── */
function getFilteredCards() {
  const editKeys = Object.keys(pendingEdits);
  const modKeys = new Set(editKeys);

  let cards = allCards.filter(c => {
    const effectiveClass = PLAYER_CLASSES.has(c.Class) ? c.Class : 'any';
    if (classFilter && effectiveClass !== classFilter) return false;
    if (typeFilter  && c.Card_Type !== typeFilter) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      if (!c.Name.toLowerCase().includes(q) && !c.Card_Key.toLowerCase().includes(q)) return false;
    }
    if (showModifiedOnly && !modKeys.has(c.Card_Key)) return false;
    return true;
  });

  // Add new cards (always shown)
  let newFiltered = newCards.filter(c => {
    if (classFilter && c.Class !== classFilter) return false;
    if (typeFilter  && c.Card_Type !== typeFilter) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      if (!c.Name.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  return { cards, newFiltered, modKeys };
}

function renderList() {
  const list = document.getElementById('cardList');
  list.innerHTML = '';

  const { cards, newFiltered, modKeys } = getFilteredCards();
  const total = cards.length + newFiltered.length;

  document.getElementById('cardCount').textContent = `${allCards.length} cards`;
  document.getElementById('cardCount2').textContent = `${total} shown`;
  document.getElementById('listCountLabel').textContent = `${total} Cards`;

  // New cards first
  newFiltered.forEach(card => {
    const el = makeCardItem(card, true, false, card.Card_Key === selectedKey && selectedIsNew);
    list.appendChild(el);
  });

  cards.forEach(card => {
    const isMod = modKeys.has(card.Card_Key);
    const isSel = card.Card_Key === selectedKey && !selectedIsNew;
    const el = makeCardItem(card, false, isMod, isSel);
    list.appendChild(el);
  });

  if (total === 0) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--gold-d);font-size:12px;">No cards match filters</div>';
  }
}

function makeCardItem(card, isNew, isModified, isSelected) {
  const el = document.createElement('div');
  el.className = 'card-item' + (isSelected ? ' selected' : '') + (isModified ? ' modified' : '') + (isNew ? ' new-card' : '');
  el.dataset.key = card.Card_Key;
  el.dataset.isnew = isNew ? '1' : '';

  const badgeClass = getBadgeClass(card.Card_Type);
  el.innerHTML = `
    <span class="type-badge ${badgeClass}">${card.Card_Type || '?'}</span>
    <span class="card-name">${card.Name || '(unnamed)'}</span>
  `;
  el.addEventListener('click', () => selectCard(card.Card_Key, isNew));
  return el;
}

function getBadgeClass(type) {
  const t = (type || '').toLowerCase();
  if (t === 'act') return 'badge-act';
  if (t === 'react') return 'badge-react';
  if (t === 'core') return 'badge-core';
  if (t === 'condition') return 'badge-condition';
  return 'badge-other';
}

/* ── Select Card ───────────────────────────────────────────────── */
function selectCard(key, isNew) {
  selectedKey = key;
  selectedIsNew = isNew;
  keyUnlocked = false;
  showStoredHtml = false;
  document.getElementById('previewToggle').textContent = 'Show stored HTML';

  const card = isNew
    ? newCards.find(c => c.Card_Key === key)
    : (pendingEdits[key] || allCards.find(c => c.Card_Key === key));

  if (!card) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editArea').classList.add('active');

  // Populate form
  document.getElementById('formTitle').textContent = card.Name || 'Edit Card';
  document.getElementById('fName').value      = card.Name || '';
  document.getElementById('fKey').value       = card.Card_Key || '';
  document.getElementById('fKey').readOnly    = true;
  document.getElementById('fStatus').value   = card.Status || 'current';
  document.getElementById('fClass').value    = card.Class || 'any';
  document.getElementById('fType').value     = card.Card_Type || 'Act';
  document.getElementById('fRuleset').value  = card.Ruleset || 'base';
  document.getElementById('fDate').value     = card.Last_Rework_Date || TODAY;
  document.getElementById('effectText').value     = card.EffectText_Plain || '';
  document.getElementById('fFlavor').value   = card.FlavorText_Plain || '';
  document.getElementById('fChangeNote').value    = (pendingEdits[key] && pendingEdits[key]._change_note) || '';

  // Show modified/new tags
  const hasPending = !!pendingEdits[key];
  document.getElementById('modifiedTag').classList.toggle('show', hasPending && !isNew);
  document.getElementById('newTag').classList.toggle('show', isNew);

  // Preview
  renderPreview(card);
  renderKwPreview(card.EffectText_Plain || '');

  // Highlight in list
  renderList();
}

/* ── Form Events ───────────────────────────────────────────────── */
function wireEvents() {
  document.getElementById('searchInput').addEventListener('input', e => { searchText = e.target.value; renderList(); });
  document.getElementById('showModified').addEventListener('change', e => { showModifiedOnly = e.target.checked; renderList(); });
  document.getElementById('fName').addEventListener('input', onFieldChange);
  document.getElementById('fFlavor').addEventListener('input', onFieldChange);
  document.getElementById('effectText').addEventListener('input', onEffectChange);
  document.getElementById('fClass').addEventListener('change', onFieldChange);
  document.getElementById('fType').addEventListener('change', onFieldChange);
  document.getElementById('fStatus').addEventListener('change', onFieldChange);
  document.getElementById('fRuleset').addEventListener('change', onFieldChange);
  document.getElementById('fDate').addEventListener('change', onFieldChange);

  document.getElementById('editKeyBtn').addEventListener('click', () => {
    keyUnlocked = !keyUnlocked;
    document.getElementById('fKey').readOnly = !keyUnlocked;
    document.getElementById('editKeyBtn').title = keyUnlocked ? 'Lock key' : 'Unlock to edit key';
    if (!keyUnlocked) document.getElementById('fKey').readOnly = true;
  });

  // Auto-slug name → key for new cards
  document.getElementById('fName').addEventListener('input', () => {
    if (selectedIsNew) {
      const slug = document.getElementById('fName').value
        .toLowerCase().trim()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
      const type = document.getElementById('fType').value.toLowerCase();
      document.getElementById('fKey').value = slug ? `${slug}-${type}` : '';
    }
  });

  document.getElementById('saveEditBtn').addEventListener('click', saveCurrentEdit);
  document.getElementById('discardBtn').addEventListener('click', discardCurrentEdit);
  document.getElementById('syncBtn').addEventListener('click', syncToFile);
  document.getElementById('refreshBtn').addEventListener('click', () => location.reload());
  document.getElementById('clearEditsBtn').addEventListener('click', clearAllEdits);
  document.getElementById('newCardBtn').addEventListener('click', () => document.getElementById('newCardModal').classList.add('show'));
  document.getElementById('cancelNewCard').addEventListener('click', () => document.getElementById('newCardModal').classList.remove('show'));
  document.getElementById('confirmNewCard').addEventListener('click', createNewCard);
  document.getElementById('previewToggle').addEventListener('click', togglePreviewMode);

  // Close modal on backdrop click
  document.getElementById('newCardModal').addEventListener('click', e => {
    if (e.target === document.getElementById('newCardModal')) document.getElementById('newCardModal').classList.remove('show');
  });
}

function onFieldChange() {
  // Live update preview name and flavor
  if (!selectedKey) return;
  const card = getCurrentFormCard();
  renderPreview(card);
}

function onEffectChange() {
  onFieldChange();
  renderKwPreview(document.getElementById('effectText').value);
}

function getCurrentFormCard() {
  const base = selectedIsNew
    ? newCards.find(c => c.Card_Key === selectedKey)
    : allCards.find(c => c.Card_Key === selectedKey);
  return {
    ...(base || {}),
    id: base ? base.id : null,
    Name: document.getElementById('fName').value,
    Card_Key: document.getElementById('fKey').value,
    Status: document.getElementById('fStatus').value,
    Class: document.getElementById('fClass').value,
    Card_Type: document.getElementById('fType').value,
    Ruleset: document.getElementById('fRuleset').value,
    Last_Rework_Date: document.getElementById('fDate').value,
    EffectText_Plain: document.getElementById('effectText').value,
    FlavorText_Plain: document.getElementById('fFlavor').value,
    HTML: base ? base.HTML : '',
  };
}

/* ── Save/Discard ──────────────────────────────────────────────── */
function saveCurrentEdit() {
  if (!selectedKey) return;
  const card = getCurrentFormCard();
  const note = document.getElementById('fChangeNote').value.trim();

  // Auto-set rework date to today if any field changed
  card.Last_Rework_Date = TODAY;
  document.getElementById('fDate').value = TODAY;

  if (selectedIsNew) {
    const idx = newCards.findIndex(c => c.Card_Key === selectedKey);
    if (idx >= 0) {
      newCards[idx] = { ...card, _change_note: note, _is_new: true };
    }
  } else {
    pendingEdits[selectedKey] = { ...card, _change_note: note };
  }

  saveEditsToStorage();
  updatePendingBadge();
  renderList();
  document.getElementById('modifiedTag').classList.add('show');
  toast('Edits saved locally. Hit Sync to push to Baserow.');
}

function discardCurrentEdit() {
  if (!selectedKey) return;
  if (!confirm('Discard edits for this card?')) return;

  if (selectedIsNew) {
    newCards = newCards.filter(c => c.Card_Key !== selectedKey);
  } else {
    delete pendingEdits[selectedKey];
  }

  saveEditsToStorage();
  updatePendingBadge();
  selectedKey = null;
  document.getElementById('editArea').classList.remove('active');
  document.getElementById('emptyState').style.display = '';
  renderList();
  toast('Edits discarded.');
}

function clearAllEdits() {
  if (!confirm(`Clear all ${Object.keys(pendingEdits).length + newCards.length} pending edits? This cannot be undone.`)) return;
  pendingEdits = {};
  newCards = [];
  saveEditsToStorage();
  updatePendingBadge();
  selectedKey = null;
  document.getElementById('editArea').classList.remove('active');
  document.getElementById('emptyState').style.display = '';
  renderList();
  toast('All pending edits cleared.');
}

/* ── New Card ──────────────────────────────────────────────────── */
function createNewCard() {
  const name = document.getElementById('ncName').value.trim();
  if (!name) { toast('Name is required', true); return; }

  const cls  = document.getElementById('ncClass').value;
  const type = document.getElementById('ncType').value;
  const ruleset = document.getElementById('ncRuleset').value;
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const key  = `${slug}-${type.toLowerCase()}`;

  const exists = allCards.find(c => c.Card_Key === key) || newCards.find(c => c.Card_Key === key);
  if (exists) { toast(`Key "${key}" already exists`, true); return; }

  const newCard = {
    id: null, Name: name, Card_Key: key, Class: cls, Card_Type: type,
    Scope: type === 'Core' ? 'Core' : 'Ability',
    Ruleset: ruleset, Status: 'current', Last_Rework_Date: TODAY,
    HTML: '', EffectText_Plain: '', FlavorText_Plain: '', _is_new: true
  };

  newCards.push(newCard);
  saveEditsToStorage();
  updatePendingBadge();
  document.getElementById('newCardModal').classList.remove('show');
  document.getElementById('ncName').value = '';
  renderList();
  selectCard(key, true);
  toast(`New card "${name}" created.`);
}

/* ── Preview ───────────────────────────────────────────────────── */
function renderPreview(card) {
  const wrap = document.getElementById('cardPreviewInner');
  if (showStoredHtml) {
    wrap.innerHTML = card.HTML || '<p style="color:var(--gold-d);padding:12px;font-size:12px;">No HTML stored yet</p>';
    return;
  }
  // Build a live preview that updates name and flavor
  // Start from stored HTML and patch name/flavor, OR build from scratch for new cards
  if (card.HTML) {
    let html = card.HTML;
    // Patch name
    const name = document.getElementById('fName').value || card.Name || '';
    html = html.replace(/(<div class="hdr-name">)[^<]*/,  `$1${escHtml(name)}`);
    // Patch flavor (flv or hdr-sub)
    const flv = document.getElementById('fFlavor').value !== undefined
      ? document.getElementById('fFlavor').value
      : (card.FlavorText_Plain || '');
    html = html.replace(/(<div class="flv">)[^<]*/, `$1${escHtml(flv)}`);
    html = html.replace(/(<div class="hdr-sub">)[^<]*/, `$1${escHtml(flv)}`);
    wrap.innerHTML = html;
  } else {
    // New card: build minimal preview
    wrap.innerHTML = buildNewCardPreview(card);
  }
}

function buildNewCardPreview(card) {
  const name   = document.getElementById('fName').value || card.Name || 'New Card';
  const cls    = document.getElementById('fClass').value || card.Class || 'any';
  const type   = document.getElementById('fType').value || card.Card_Type || 'Act';
  const flavor = document.getElementById('fFlavor').value || '';
  const scope  = type === 'Core' ? 'Core' : 'Ability';
  return `
    <div class="card acc-${cls}">
      <div class="hdr">
        <div class="hdr-top">
          <span class="cap cap-neutral">${scope}</span>
          <span class="cap cap-neutral">${type}</span>
        </div>
        <div class="hdr-name">${escHtml(name)}</div>
      </div>
      <div class="cbody">
        ${flavor ? `<div class="flv">${escHtml(flavor)}</div><div class="hr"></div>` : ''}
        <div class="etxt" style="color:#5a4020;font-style:italic;font-size:10px;">
          Effect text will be rendered by Claude on sync
        </div>
        <span class="idtag">${cls}</span>
      </div>
    </div>
  `;
}

function togglePreviewMode() {
  showStoredHtml = !showStoredHtml;
  document.getElementById('previewToggle').textContent = showStoredHtml ? 'Show live preview' : 'Show stored HTML';
  if (!selectedKey) return;
  const base = selectedIsNew
    ? newCards.find(c => c.Card_Key === selectedKey)
    : (pendingEdits[selectedKey] || allCards.find(c => c.Card_Key === selectedKey));
  if (base) renderPreview(base);
}

/* ── Keyword Preview ───────────────────────────────────────────── */
const KW_MAP = {
  'Hit Dice': 'hd', 'Hit Die': 'hd',
  'Boost': 'boost', 'Resolve': 'resolve', 'Threat': 'threat',
  'Crit': 'crit', 'Toll': 'toll', 'Miss': 'miss', 'Aid': 'aid', 'Mill': 'mill'
};
const IX_MAP = {
  'Act': 'act', 'React': 'react', 'Instinct': 'instinct', 'Background': 'background',
  'Bond': 'bond', 'Flaw': 'flaw', 'Ancestry': 'ancestry', 'Connection': 'connection', 'Item': 'item',
  'Barbarian': 'barbarian', 'Fighter': 'fighter', 'Paladin': 'paladin', 'Cleric': 'cleric',
  'Ranger': 'ranger', 'Rogue': 'rogue', 'Druid': 'druid', 'Warlock': 'warlock',
  'Bard': 'bard', 'Wizard': 'wizard', 'Monk': 'monk'
};
const BOLD_WORDS = ['Exposed','Rattled','Rooted','Hidden','Marked','Sundered','Break',
  'Action','Reaction','Draw','Discard','Shuffle','Cleanse','Scene',
  'Move','Strike','Speak','Sense','Know','Focus','Enter','Exit','Read','Summon','Lift','Restrain'];

function renderKwPreview(text) {
  const body = document.getElementById('kwBody');
  if (!text.trim()) { body.innerHTML = '<em style="color:#9a8060;">No effect text yet</em>'; return; }

  let html = escHtml(text);

  // Apply keyword pills (longest first to avoid partial matches)
  for (const [word, cls] of Object.entries(KW_MAP).sort((a,b) => b[0].length - a[0].length)) {
    const re = new RegExp(`\\b${word}\\b`, 'g');
    html = html.replace(re, `<span class="kw kw-${cls}">${word}</span>`);
  }
  for (const [word, cls] of Object.entries(IX_MAP)) {
    const re = new RegExp(`\\b${word}\\b`, 'g');
    html = html.replace(re, `<span class="ix ix-${cls}">${word}</span>`);
  }
  for (const word of BOLD_WORDS) {
    const re = new RegExp(`\\b${word}\\b`, 'g');
    html = html.replace(re, `<strong>${word}</strong>`);
  }
  html = html.replace(/\n/g, '<br>');
  body.innerHTML = html;
}

/* ── Sync to File (File System Access API) ─────────────────────── */
const IDB_NAME = 'instinct-card-editor';
const IDB_STORE = 'handles';

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e);
  });
}

async function saveDirHandleToIDB(handle) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(handle, 'repoDir');
    tx.oncomplete = res;
    tx.onerror = rej;
  });
}

async function loadDirHandleFromIDB() {
  try {
    const db = await openIDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('repoDir');
      req.onsuccess = e => res(e.target.result || null);
      req.onerror = rej;
    });
  } catch(e) { return null; }
}

async function getOrPickDirectory() {
  if (dirHandle) {
    try { await dirHandle.requestPermission({ mode: 'readwrite' }); return dirHandle; }
    catch(e) { dirHandle = null; }
  }
  const saved = await loadDirHandleFromIDB();
  if (saved) {
    try {
      const perm = await saved.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { dirHandle = saved; return dirHandle; }
    } catch(e) { /* need to re-pick */ }
  }
  dirHandle = await window.showDirectoryPicker({ id: 'instinct-repo', mode: 'readwrite' });
  await saveDirHandleToIDB(dirHandle);
  return dirHandle;
}

async function syncToFile() {
  const totalEdits = Object.keys(pendingEdits).length + newCards.length;
  if (totalEdits === 0) { toast('No pending edits to sync.', false); return; }

  if (!('showDirectoryPicker' in window)) {
    // Fallback: download the file
    downloadEditsFile();
    return;
  }

  try {
    const dir = await getOrPickDirectory();
    const editsPayload = buildEditsPayload();
    const fileHandle = await dir.getFileHandle('card-edits.json', { create: true });
    const writable   = await fileHandle.createWritable();
    await writable.write(JSON.stringify(editsPayload, null, 2));
    await writable.close();
    toast(`Wrote ${totalEdits} edits to card-edits.json — now tell Claude to sync.`);
  } catch(e) {
    if (e.name === 'AbortError') return;
    console.error(e);
    toast('Could not write file — trying download instead.', true);
    downloadEditsFile();
  }
}

function buildEditsPayload() {
  const edits = [];

  // Updates to existing cards
  for (const [key, card] of Object.entries(pendingEdits)) {
    edits.push({
      action: 'update',
      id: card.id || null,
      Card_Key: card.Card_Key || key,
      Name: card.Name,
      Class: card.Class,
      Card_Type: card.Card_Type,
      Scope: card.Scope || (card.Card_Type === 'Core' ? 'Core' : 'Ability'),
      Ruleset: card.Ruleset,
      Status: card.Status,
      Last_Rework_Date: TODAY,
      EffectText_Plain: card.EffectText_Plain,
      FlavorText_Plain: card.FlavorText_Plain,
      Change_Note: card._change_note || ''
    });
  }

  // New cards
  for (const card of newCards) {
    edits.push({
      action: 'create',
      Card_Key: card.Card_Key,
      Name: card.Name,
      Class: card.Class,
      Card_Type: card.Card_Type,
      Scope: card.Scope || (card.Card_Type === 'Core' ? 'Core' : 'Ability'),
      Ruleset: card.Ruleset,
      Status: card.Status || 'current',
      Last_Rework_Date: TODAY,
      EffectText_Plain: card.EffectText_Plain,
      FlavorText_Plain: card.FlavorText_Plain,
      Change_Note: card._change_note || 'New card'
    });
  }

  return { timestamp: new Date().toISOString(), edits };
}

function downloadEditsFile() {
  const payload = buildEditsPayload();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'card-edits.json';
  a.click();
  URL.revokeObjectURL(url);
  // Show a persistent instruction in the UI
  const msg = document.createElement('div');
  msg.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#2a1d10;border:1px solid var(--gold-d);color:var(--text);padding:12px 18px;border-radius:8px;font-size:12px;z-index:600;max-width:420px;text-align:center;line-height:1.6;';
  msg.innerHTML = `<strong style="color:var(--gold);">card-edits.json downloaded.</strong><br>Move it into your repo root folder, replacing the existing one.<br><em style="color:var(--gold-d);">Then tell Claude: "sync my edits"</em><br><br><small style="color:var(--gold-d);">Tip: Use <strong>localhost:3737/card-editor.html</strong> for direct file writing (no download needed).</small>`;
  const close = document.createElement('button');
  close.textContent = '✕';
  close.style.cssText = 'position:absolute;top:6px;right:10px;background:none;border:none;color:var(--gold-d);font-size:16px;cursor:pointer;';
  close.onclick = () => msg.remove();
  msg.appendChild(close);
  document.body.appendChild(msg);
}

/* ── Badge ─────────────────────────────────────────────────────── */
function updatePendingBadge() {
  const n = Object.keys(pendingEdits).length + newCards.length;
  const badge = document.getElementById('pendingBadge');
  const clearBtn = document.getElementById('clearEditsBtn');
  badge.textContent = `${n} pending`;
  badge.classList.toggle('hidden', n === 0);
  clearBtn.style.display = n > 0 ? '' : 'none';
}

/* ── Toast ─────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

/* ── Util ──────────────────────────────────────────────────────── */
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Start ─────────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
